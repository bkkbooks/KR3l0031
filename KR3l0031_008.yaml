body:
  text: 澠水燕談録卷八宋王闢之撰歌咏藝祖收河東凱旋范杲叩馬進詩曰千里版圖來浙右一聲金皷下河東上愛嘆不已增秩賜章服杲魯公質之姪好學有文時稱髙梁柳范謂髙弁梁周翰柳開與杲也楊侍讀徽之以能詩聞太宗知其名索其所著以百篇獻上卒章曰少年牢落今何幸叨遇君王問姓名太宗和賜且語近臣曰徽之文雅可尚操履端正拜禮部侍郎選十聮寫於御屏梁周翰之詩曰誰似金蕐楊學士十聯詩在御屏風江行云犬吠竹籬沽酒客鶴隨苔㟁洗衣僧寒食云天寒酒薄難成醉地逈樓髙易斷䰟塞上云戍樓煙自直戰地雨長腥嘉陽川云青帝已教春不老素娥何惜月長圓又云浮花水入瞿塘峽帶雨雲歸越雋州哭江為云廢宅寒塘水荒墳宿草煙元夜云春歸萬年樹月滿九重城僧舍云偶題巖石雲生筆閒繞庭松露濕衣湘江舟行云新霜染楓葉皓月借蘆花宿東林云開盡菊花秋色老落遲桐葉雨聲寒王元之初知制誥上疏雪徐鉉貶商州召入為學士坐辯孝章皇后不實謫滁州復召知制誥撰太祖尊號册坐輕誣謫黄州作三黜賦以自述時蘇易簡知舉適放牓奏曰禹偁翰院名儒今將全牓諸生送於郊上可其奏諸生别元之占一絶付狀元孫何曰為我多謝蘇易簡云綴行相送我何榮老鶴乗軒愧谷鶯三入承明不知舉看人門下放門生楊文公初為光禄丞太宗頗愛其才一日後苑賞花宴詞臣不得預以詩貽諸館閣曰聞帶宫花滿鬢紅上林絃管侍重瞳蓬萊咫尺無因到始信仙凡迥不同諸公不敢匿以詩進呈上詰有司所以不召左右以未貼職例不得預即命直言院免謝令預晩宴時以為榮夏文莊公竦初侍其父監通州狼山鹽塲渡口詩曰渡口人稀黯翠煙登臨尤喜夕陽天殘雲右倚維揚樹遠水南回建業船山引亂猿啼古寺電驅甘雨過閒田季鷹死後無歸客江上鱸魚不直錢時年十七後之題詩無出其右識者以謂甘雨過閒田雖有為霖之志而終無濟物之澤陳文惠公堯佐端拱元年程宿榜下及第同年二十八人時公兄弟俱未仕父省華為小官家貧魏野以詩賀之云放人少處先登第舉族貧時已受官王文正公曾李文定公廸咸平中景德間相繼狀元及第其後更踐政府及罷相鎮青又為交承故文正送文定移鎭兖海詩有錦標奪得曾相繼金鼎調時亦踐更之句又云并土兒童君再見㑹稽章紱我偏榮葢文定再鎭兖而青社文正鄉里也慶厯中歐陽文忠謫守滁州有琅邪幽谷山川竒麗鳴泉飛瀑聲若環佩公臨聽忘歸僧智仙作亭其上公刻石為記以遺州人既去十年太常博士沈遵好竒之士聞而往遊愛其山水秀絶以琴寫其聲為醉翁吟葢宫聲三疊後㑹公河朔遵援琴作之公歌以遺遵并為醉翁引以叙其事然調不主聲為知琴者所惜後年公薨遵亦没其後廬山道人崔閒遵客也妙於奏理常恨此曲無詞乃譜其聲請於東坡居士子瞻以補其闕然後聲詞皆備遂為琴中絶妙好事者争傳其詞曰琅然清圓誰彈嚮空山無言惟有醉翁知其天月明風露姢姢人未眠荷蕢過山前曰有心哉此絃第二疊汎聲同此醉翁嘯咏聲和流泉醉翁去後空有朝吟夜怨山有時而同巓水有時而回淵思翁無歳年翁今為飛仙此意在人間試聽徽外三兩絃方其補詞閑為弦其聲居士倚為詞頃刻而就無所㸃竄遵之子為比丘號本覺真禪師居士書以與之云二水同器有不相入二琴同手有不相應沈君信手彈而與泉合居士縱筆作詞而與琴㑹此必有真同者矣海陵西溪鹽塲初文靖公嘗官於此手植牡丹一本有詩刻石後范文正公亦嘗臨涖復題一絶陽和不擇地海角亦逄春憶得上林色相看如故人後人以二公詩筆故題詠極多而花亦為人貴重䕶欄歳久茂盛每歳花開百朶為海濵之竒觀青州布衣張在少能文尤精詩竒蹇不遇老死塲屋嘗題興龍寺老栢院詩云南隣北舍牡丹開年少尋芳日幾回惟有君家老栢樹春風來似不曾來大為人傳誦文潞公皇祐中鎭青詣老栢樹訪在所題字已澷滅公惜其不傳為大字書於東廊之壁後三十餘年當元豐癸亥東平畢仲甫將叔見公於洛下公誦其詩囑畢往觀畢至青訪其故處壁已圮毁不可得為刻於天宫石柱又刻其故所題之處蘇子美慶厯末謫居姑蘇以詩自放一日觀魚滄浪亭有詩云我嗟不及遊魚樂虛作人間半世人識者以為不祥未幾果卒年四十一濮人杜默師雄少有逸才長於歌篇師事石守道作三豪詩以遺之稱默為歌豪石曼卿詩豪永叔文豪而永叔亦有詩曰贈之三豪篇而我濫一名默久不第落魄不䕶名節屢以私干歐陽公公稍異之默怨憤作桃花詩以諷由是薄其為人鄭毅夫詩格飄放晩年為雨詩曰老火燒空未肻休忽驚快雨破新秋晩雲濃淡白日下只在楚江南㟁頭未幾自杭移青道病泊舟髙郵亭下乃卒石曼卿天聖寳元間以歌詩豪於一時嘗於平陽作代意寄師魯一篇詞意深美曰十年一夢花空委依舊山河損桃李鴈聲北去燕西飛高樓日日春風裏眉比石州山對起嬌波淚落妝如洗汾河不斷天南流天色無情淡如水曼卿死後故人關詠夢曼卿曰延年平生作詩多矣獨常自以為平陽代意一首最為得意而世人罕稱之能令予此詩盛傳於世在永言爾詠覺增廣其詞度之節拍引以聲韻於是天下争歌之他日復夢曼卿謝詠詠字永言李淑守鄭州題少主陵曰弄耜牽車晩鼓催不知門外倒戈回荒墳斷壠纔三尺剛道房陵半仗來時陳文惠薨淑奉詔為墓誌淑言堯佐好為小詩間有竒句陳諸子請易之淑不從乃言其詩謗太祖落淑侍讀學士祥符中有劉偁者久困銓調為陜州司法叅軍廉愼至貧及罷官無以為歸計賣所乗馬辦裝跨驢以歸魏野以詩贈行云誰似甘棠劉法掾來時乗馬去騎驢未幾真宗祀汾隂過陜詔徵野赴行在野不奉詔上遣中使就野家索其所著得贈偁詩上嘆賞久之語宰臣曰小官中有廉貧如此者使召之偁方為江南幕吏至以為京官知青州博興縣後有差除上曰得如劉偁者可矣未數年亟遷主客郎中司户部郎官王元之在翰林太宗恩遇極厚嘗侍宴瓊林獨召至御榻顧問帝語宰相曰王某文章獨歩當代異日垂名不朽元之有詩云瓊林侍遊宴金口獨褒揚張芸叟奉使大遼宿州館中有題子瞻老人行於壁者聞范陽書肆亦刻子瞻詩數十篇謂大蘇小蘇子瞻才名重當代逺方外國亦愛服如此芸叟題其後曰誰題佳句到幽都逢著邊人問大蘇書畫唐劉忠州晏重修禹廟碑崔巨文叚季展書劉當世顯人所記撰及書碑者宜皆知名士矧巨之文季展之書有過人者而其名不著於世何也景祐中周膳部越為三門發運判官始以墨本傳京師越書為當時所重以是季展書亦為人所愛其後屯田左員外瑾慮其刓闕搆宇以覆其碑而摸刻於他石以廣其傳焉季展書刻石者少有洛祠記多心經不著姓氏驗其筆畫亦季展書也太宗朝王著學右軍書深得其法侍書翰林帝聽政之餘留心筆札數遣内侍持書示著著對如初或詢其書意著曰書固佳矣若遽稱善恐帝不復用意其後帝筆法精絶世以為由著之規益也李成畫平遠寒林前人所未嘗為氣韻瀟灑煙林清曠筆勢頴脫墨法精絶髙妙入神古今一人真畫家百世師也雖昔王維李思訓之徒亦不可同日而語其後燕貴翟院深許道寧輩或僅得一體語全則遠矣考白與成同時人與成子覺並列史館其所紀宜不妄不知文忠公何以據也正當以誌為定翟院深營丘伶人師李成山水頗得本體一日府宴張樂院深將擊皷為節忽停撾仰望皷聲不續左右驚愕太守召問之對曰適樂作次有孤鴻飛淡佇可愛意欲圖寫凝思久之不知皷聲之失節也太守笑而釋之歐陽文忠公文章道義天下宗師凡世俗所嗜一無留意獨好古石刻自岐陽石皷岱山鄒嶧之下及漢魏以來碑刻山崕川谷荒林破塚莫不皆取以為集古録因其石本軸而藏之撮其大要列為目録并載可以正史學之闕謬者以傳後學䟦尾多公自題復為之序請蔡君謨書之真一代之絶筆也玉堂北壁有毘陵董羽畫水波濤若動見者駭目歳久其下稍壞學士蘇易簡受命知舉將入宫語學士韓丕擇名筆完補之丕呼圬者墁其下以朱欄䕶之蘇出院以是悵惜不已陳文惠公善八分書變古之法自成一家雖㸃畫肥重而筆力勁健能為方丈字謂之堆墨目為八分凡天下名山勝處碑刻題牓多公親蹟祥符中金普公出典金陵真宗以袁安卧雪圖賜之真古妙手或言周昉筆亦莫可辨至金陵擇城之西南隅曠絶之地建賞心亭中設巨屏置圖其上遂為金陵竒觀歳久頗失覆䕶縑素敗裂稍為好事者竊去嘉祐中王君玉出守郡首詣觀之惜其剽取已盡作詩題其旁云昔人已化遼天鶴佳事難尋卧雪圖皇祐中仁宗命待詔髙克明軰畵三朝聖迹一百事人物纔寸餘宫殿山川車馬儀衛咸具詔學士李淑等譔次序贊為十卷曰三朝訓鑑圖鏤板印貽大臣宗室澠水燕談録卷八
