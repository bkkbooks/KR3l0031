body:
  text: 澠水燕談録卷五宋王闢之撰髙逸鎮陽道士證隱博學多識道行精潔太祖北征召見時已九十而形氣不衰上訪以養生之術隱曰我無為而人自化我無欲而民自正軒轅帝堯享國延年率由此道帝嘉之賜以茶帛陳摶周世宗常召見賜號白雲先生太平興國初召赴闕太宗賜御詩云曾向前朝號白雲後來消息杳無聞如今若肯隨徵召總把三峰乞與君先生服華陽巾草屨垂縚以賔禮見賜坐上方欲征河東先生諫止會軍已興令寢御園百餘日方起兵還果無功恩禮特異賜號希夷久之辭歸進詩以見志云草澤吾皇詔圖南摶姓陳三峰千載客四海一間人世態從來薄詩情自得真乞全麞鹿性何處不稱臣上知不可留賜宴使宰相兩禁傳坐為詩以寵其歸田徵君告字象宜篤學好文嘗學詩於希夷先生以詩評授之故詩尤清麗平居寡薄志在經世太祖建國思得異人詔詣公車會遭父母喪久之東逰過濮止王元之舍元之貽書勉進其道會大河決溢君推明鯀禹之所治著禹元經三卷將上之不果已而得水樹於濟南明水將隱居焉故致書徐常侍鉉質其去就鉉答曰負鼎叩角顧廬築巖各由其時不失其道在我而已何常之有遂決髙蹈志時發易筮之遇暌因自號暌叟從學者常數百人宋維翰許衮最其髙弟二子登朝盛稱其師淳化中韓丕言於天子召赴闕詔書及門而卒皇祐中濟南翟書裒其遺逸得四十八篇析為三卷又次其出處為暌叟别傳云景德中种放賜號先生暫還嵩山真宗置酒資政殿餞放侍臣當直者四人預時所司不宿具皆相顧不敢坐上乃親定位次翰林學士朝迥資政殿學士王欽若東向知制誥朱選西向次迥待制戚綸西向次欽若放北面對上示特客禮酒半上賦七言一章賜放侍臣皆賦士大夫榮之孫宣公奭以太子少傅致仕居於鄆一日置宴詩廳仁宗嘗賜詩刻石所居之廳壁上語客曰白傅有言多少朱門鎖空宅主人到老不曾歸今老夫歸矣喜動於色復顧石守道諷易離卦九三爻且曰樂以忘憂自得小人之志歌而鼓缶不興大耋之嗟公以淳德奧學勸講禁中二十餘年晚節勇退優遊里中終始全德近世少匹真宗優禮种放近世少比一日登龍圖閣放從行真宗垂手援放以上顧近臣曰昔日明皇優李白御手調羮今朕以手援放登閣厚賢之禮無前代矣故將永叔薦放孫謙云放早以逸民被遇章聖有握手登樓之眷真宗久欲大用放固辭乃止惜夫种放少舉進士不第希夷先生謂之曰此去逢豹則止他日當出於衆人初莫知其意故放隱於南山豹林谷真宗召見寵待非常拜工部侍郎皆符其言放别業在終南山放學行髙古後生從學者衆性頗嗜酒躬耕種秫以自釀所居有林泉之勝尤為幽絶真宗聞之遣中使携畫工圖之開龍圖閣召輔臣觀焉其後甘棠魏野郊居有幽趣帝亦遣人圖之故野詩云幽居帝畫看麻先生仲英有俊才七嵗能詩隨侍官鄜州宋翰林白方謫官鄜聞而召之坐賦詩十篇宋大稱賞翌日宋以浣溪箋李廷圭墨諸葛氏筆遺之乃贈以詩曰宣毫歙墨川箋紙寄與麻家小秀才七嵗能吟天骨異前生應折桂枝來十七上禮部歸以二親既喪祿不及養無復仕宦意退居臨淄辨士里别墅久而記覽該洽行義髙潔鄉黨化服鄉里爭訟者聽先生辨之雖凶年盜不入其家富韓公文潞公皆嘗致書幣龎莊公出鎮遣其子奉書召至府中禮之極厚薦其行義於朝詔為國子四門助教州學教授東方學者爭師之卒年九十或以為宋詩前生已折桂枝來即今世不復折也麻一試不第終身罷舉詩已讖之矣陜右魏處士野蒲中李徵君瀆乃中表也俱有髙節以吟詠相善野於東郊鑿土室方丈蔭以修竹泉流其前曰樂天洞瀆結茅齋中條之陰曰浮雲堂皆有瀟灑之趣每乘興相過賦詩飲酒纍日乃去一日瀆過野曰前夕恍惚若夢中林下有人曰行到水窮處未知天盡時即正其誤曰盍云坐看雲起時對曰此浮雲安得興起邪瀆命此必死期故來訪别還家未幾年卒史延壽嘉州人以善相遊京師貴人爭延之視貴賤如一坐輒箕踞爾我人號曰史不拘又曰史我吕文靖公嘗邀之延壽至怒閽者不開門批之閽者曰此相公宅雖侍臣亦就客次延壽曰彼來者皆有求於相公我無求相公自欲見我耳不開門我竟還矣閽者走白公開門迎之延壽挾術以逰無心於用舍故能自重如此建安黃晞慶厯中逰京師髙文苦學為世稱重著書數萬言自號謷隅子貧有守不干科舉而貌寢氣寒不自修飾石守道太學生員厚禮幣聘為學正踰垣避之故歐陽文忠公詩曰羔鴈聘黃晞晞驚走鄰家近臣交章薦其道義詔受京官將為國子司業拜命數月暴卒僧舍慶厯末杜祁公告老退居南京與太子賔客致仕王渙光祿卿致仕畢世長兵部郎中分司米實尚書郎致仕馮平為五老會吟醉相勸士大夫髙之祁公以故相耆德尤為天下傾慕兵部詩云九老且無元老貴莫將西洛一般看五人年皆八十餘康寧爽健相得甚歡故祁公詩云五人四百有餘嵗深稱分曹與挂冠而畢年最髙時九十餘故其詩云非才忝預最髙年是時歐陽文忠留守睢陽而歎慕借其詩觀之用次韻卒章云聞説優遊多唱和新詩何惜借傳看初歐陽文忠公與趙少師槩同在中書嘗約還政後再相會及告老趙自南京訪文忠公於潁上文忠公所居之西堂曰會老仍賦詩以志一時盛事時翰林吕學士公著方牧潁職兼侍讀及龍圖特置酒於堂宴二公文忠親作口號有金馬玉堂三學士清風明月兩間人之句治平初龍圖閣直學士趙公抃鎮成都有張山人者不知所居數至李道士舍一日語李曰龍圖公促治裝行當入覲且參大政矣趙聞而異之喻李令與俱來及再至李邀飲同見公張固辭曰與公相見自有期今未可也李具以告公公曰俟其再至密令人來白當屏去導從潛往見之他日又至李方遣人白公而遽求還留之不可曰龍圖且來矣公方命駕聞其去乃止益奇之未幾果應召命乃參政柄及出鎮青社熙寧五年張遺書云當來相見公大喜語賔佐曰張山人來矣久之無來至秋公奉詔再領成都方悟曰山人言來乃吾當往也故將行先寄張詩有不同參政初時入謂餘慶也學尚書兩次來謂張乖崖到日先生應笑我白頭猶自走塵埃富韓公熙寧四年以司空歸洛時年六十八是年司馬端明不拜樞密副使求判西臺時年五十三二公安居沖默不交世務後十一年當元豐五年文潞公留守西京慕唐白樂天九老會於是悉聚洛中大夫賢而老自逸者韓公置酒相樂凡十二人又命鄭奐圖形妙覺僧舍各賦詩時人呼之曰洛陽耆英會而司馬為之序其相聚也用洛中舊俗敘齒不尚官時韓公年七十九潞公與司封席汝言皆七十七朝議大夫王尚恭七十六太常卿趙丙祕書監劉几衛州防禦使馮行已皆七十五天章閣待制楚建中七十三朝議大夫王慎言七十二大中大夫張問龍圖閣直學士張燾皆七十司馬六十四故潞公詩云當年尚齒尤多幸十二人中第二人韓公贈潞詩云顧我年齡雖第一在公勳德自無雙潞再答韓公詩云惟公福祿并功德合是人間第一人是時宣徽使王公拱宸年七十留守大名貽詩二公預其數凡十三人司馬公優遊洛中不屑世務棄物我一窮通自稱曰齊物子元豐中秋與樂令子訪親洛泗並轡過韓城抵登封憩峻極下院趨嵩陽造崇福宫至紫霄觀尋會善寺過轘轅遽達西洛少留廣度寺歷龍門至伊陽以訪奉先寺登華嚴閣觀千佛巖躡山徑瞻髙公真堂步潛溪還保應觀文富二公之廣化寺拜邠陽堂下涉伊水登香山到白公影堂詣黃龕院倚石樓臨節灘還伊口凡所經逰發為詠歌録敘謂之逰録荆南朱昻博學有清德晚年以工部侍郎乞骸骨既得謝真宗賜坐寵詔留候秋涼還荆南故吳淑贈詩曰浴殿早涼初閣筆渚宫秋晚得懸車比行錫宴玉津園侍臣皆赴坐中內侍傳詔各賦詩餞行凡四十八篇獨李翰長維詩最竒絶云清時納祿猶強健白首還家正太平昻弟協亦退居里中皆八十餘時謂渚宫二疏劉孟節概青州壽光人少師种放篤古好學酷嗜山水而天姿絶俗與世齟齬故久不得仕晚得一名亦不去為吏慶厯中朝廷以海上岠嵎山地震逾年不止遣使遺問安撫使以先生名聞詔命之官不受就青之南有冶原昔歐冶子劍鑄之地山竒水清旁無人煙叢筠古木氣象幽絶富韓公之鎮青也知先生久欲其間為築室泉上為詩并序以餞之曰先生已歸隱山東人物空且言先生有志於名不幸無位不克施於時著書以見志謂先生雖隱其道與日月雷霆相震輝其後范文正公文潞公皆優禮之欲薦之先生懇祈亦不能強以成其高先生少時多寓居龍興僧舍之西軒往往憑欄靜立懷想世事吁唏或獨以手拍欄杆嘗有詩曰讀書誤我四十年幾回醉把欄杆拍王樵字肩望淄川人性超逸深老易善擊劍有槩世之志廬梓桐山稱淄右書生不交塵務山東賈同李冠皆尊仰之咸平中契丹內侵舉族北俘潛入衆中訪其親纍年乃歸持諸喪刻木為親葬奐山東立祠奉侍終身太守劉通詣樵踰垣遁去其後髙辨知州事范諷為通判相與就見之李冠以詩寄之曰霜臺御史新為郡棘寺廷評繼下車首謁梓桐王處士教風從此重詩書晚自號贅世翁為贊書其門曰書生王樵薄命寡志無益於人道號贅世豫卜地纍茆名繭室中壘石塌刻銘其上曰生前殺軀以虞不備沒後寄魂以備不虞後感疾即入室自掩户乃卒以古劍殉葬著逰邊集安邊三策説史皆散失濟南李芝為贅世先生傳載其事蒲中李續好學有髙志廬中條山以泉石吟咏自樂未嘗造州縣真宗祀汾陰詔赴行在續不起有表稱謝云十行溫詔初聞丹鳳銜來一片間心已被白雲留住澠水燕談録卷五
