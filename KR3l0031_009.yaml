body:
  text: 澠水燕談録卷九宋王闢之撰事志開寶中平嶺表擇廣州內臣聰慧者數十人於教坊習樂名簫韶部改曰雲韶賜宴則用之太平興國中擇軍中善樂者名曰引龍直遊幸騎而導駕後曰鈞容直取鈞天之義也太宗朝府州折御卿貢馬特異格不甚髙而日行千里口旁有碧紋如雲霞因目曰碧雲騢上征太原往來乘之上下山嶺如履平地上則屈前足下則屈後足上下如坐安輿不知登降髙下之勞圉人供芻粟或少倨則嘶鳴奮躍踶齧不已此尤異他馬也上崩悲鳴不食骨立人不忍視真宗遣從靈駕至永熙陵乃斃詔與桃花犬同坎瘞洛陽至京六驛舊未嘗進花李文定公留守始以花進歲差府校一人乘驛馬晝夜馳至京師所進止姚黃魏紫三四朵用菜葉實籠中籍覆上下使馬不動搖亦以禦日氣又以蠟封花蒂可數日不落今歲貢不絶朐山有花類海棠而枝長花尤密惜其不香無子既開繁麗嫋嫋如曵錦帶故淮南人以錦帶目之王元之以其名俚命之曰海仙有詩曰春憎窈窕教無子天為妖嬈不與香萊公初及第知歸州巴東縣手植雙柏於庭至今民愛之以比甘棠謂之萊公柏焉南唐後主留意筆札所用澄心堂紙李廷圭墨龍尾石硯三物為天下之冠自李氏之亡龍尾石不復出嘉祐中校理錢仙芝知歙州訪得其所乃大溪也李氏嘗患溪不可入斷其流使由他道李氏亡居民苦其溪之回遠導之如昔石乃絶仙芝移溪還故道石乃復出遽與諸溪並行莆陽蔡君謨常評李超易水人唐末與其子廷圭渡江至歙州以其地多美松因留居以墨名家本姓奚江南賜姓李氏圭或為邽圭弟廷寬男承晏承晏男乂用皆有聞易水江南又有朱君德柴詢柴成務李文遠張遇陳贇著名當時其制有劒脊圓餅拙墨進貢墨供堂墨其靣多作蛟龍其幕音縵有宣府字或云止宣或著姓氏或别州府今人間已少傳者仁宗嘉祐中宴近臣於宴嘗以墨賜之其文曰新安香墨其後翰林諸君承賜者皆廷圭雙脊龍樣尤為佳品咸平中陳文惠謫官潮州時州人張氏濯於江邊為鰐魚食之公曰昔韓吏部以文投惡溪鰐魚為吏部遠徙今鰐魚既食人則不可赦矣乃命吏督漁者網而得之鳴鼓告其罪戮之於市圖其形為之質至今多傳之鰐大者數丈或𤣥黃或蒼白色似龍而無角類蛇而有足睅目利齒見者駭之卵出山谷間大率為鰐者十二三其餘或為黿或為龜也喜食人畜其食必以尾卷去如𧰼餂鼻也河中府舜泉坊二井相通匿孔旁出者祥符中真宗祀汾駐驆蒲中車駕臨觀賜名孝廣泉并以名其坊御製贊紀之蒲濵河地鹵泉鹹獨此井甘美世以為異亳州法相禪院矮檜髙數尺偃亞蟠屈枝葉繁茂不可圖狀唐大中年李待價石記云圓䕃三丈餘距今又百餘年廣袤為五六丈一郡之珍玩士人目其寺曰矮檜真宗祀老子嘗駐其下今御榻尚在故陸子履詩云先皇玉座親臨地故老於今涕泫然建茶盛於江南近歲制作尤精龍團茶最為上品一斤八餅慶厯中蔡君謨為福建運使始造小團以充歲貢一斤二十餅所謂上品龍茶者也仁宗尤所珍惜雖宰相未嘗輒賜惟郊禮致齊之夕兩府各四人共賜一餅宫人剪金為龍鳯花貼其上八人分蓄之以為竒玩不敢自試有佳客出為傳玩歐陽文忠公云茶為物之至精而小團又其精者也嘉祐中小團初出時也今小團易得何至如此多貴通州狼山廣教寺在唐為慈航院在江中山上昔人有詩云飛來靈鷲嶺化作寶陀山前後乃江海相接處出二山間水湍礙石率多覆溺昔有僧率其徒操楫以護之舟無觸石之患故有慈航之名近年江水南徙山之前後皆陸田後人又有詩云昔年船底浪今日馬蹄痕皆紀實也慶厯四年貝州卒王則據城叛詔明鎬加討久無功參知政事文彥博請行仁宗欣然遣之且曰貝字加文為敗卿必擒則矣未逾月而捷報聞詔拜平章事曲赦河北改貝州為恩州揚州后土廟有花一株潔白可愛歲久木大而花繁世俗目為瓊花不知實何木也世以為天下無之惟此一株孫冕使訪之山中甚多但多苦樵斧野燒故木不得大而花不能盛不為人貴孫傷之作詩曰可憐遐地産常化燎原灰或曰此詩乃李文饒賦玉蘂也長安故都多碑石景祐初莊獻太后遣中使建塔城中時姜遵知永興盡力於塔材漢唐公卿墓石十亡八九楊大年談苑叙五行德金石厄事宋有國百餘年長安碑刻再厄矣惜哉契丹國産毗狸形類大鼠而足短極肥其國以為殊味火地取之以供國主之膳自公相下不可得而嘗常以羊乳飼之頃年北使嘗携至京烹以進御今朝臣奉使其國者皆得食之然中國人亦不嗜其味淄州淄川縣梓桐山石門澗有石曰青金色青黑相雜其文如銅屑或云即自然銅也理細密范文正公早居長白山往來于此嘗見其石皇祐末公知青遣石工取以為硯極發墨頗類歙石今東方人多用之或曰范公石然不耐久久則下乃斫裂青州城西南皆山中貫洋水限為二城先時跨水植柱為橋每至六七月間山水暴漲水與柱鬬率常壞橋州以為患明道中夏英公守青思有以捍之㑹得牢城廢卒有智思疊巨石固其岸取大木數十相貫架為飛橋無柱至今五十餘年橋不壞慶厯中陳希亮守宿以汴橋壞率常損官舟害人命乃法青州所作飛橋至今汾汴皆飛橋為往來之利俗曰虹橋慶厯中洪州江岸崩得謝朓撰并書宋海陵王墓銘石朓文固竒而書亦有法類鍾繇書石入沈括家十餘年後為夏元昭匿之不知所在皇祐中范文正公鎮青興龍僧舍西南洋溪中有醴泉湧出公構一亭泉上刻石記之其後青人思公之德目之曰范公泉環泉古木蒙密塵迹不到去市㕓才數百步而如在深山中自是幽人逋客往往賦詩鳴琴烹茶其上日光玲瓏珍禽上下真物外之遊侣非人間世也歐陽文忠公劉翰林貢父及諸名公多賦詩刻石而文忠公及張禹功蘇唐卿石榜之亭中最為營丘佳處華陽楊褒好古博物家雖貧尤好書畫竒玩充實槖中家姬數人布裙糲食而歌舞絶妙故歐陽公贈之詩云三腳木床坐調曲蓋言褒之貧也褒皇祐中宿華州西隂寺僧云西華溪下最勝夜間燈滅於閽中見光燁然旦起視之石也詢寺處郡僚宴集之地故以此石鎮內耳至夜褒移至别地光復在焉意其隱玉因求得之輦至都下使玉工視之以為然剖之得玉徑數寸溫潤絶美光采粲然玉人驚之曰至寶也今王府中未有其比㑹朝廷求良玉琢鎮國寶褒因獻之遂為璽鎮國華州軍額朝廷以名與璽同乃改曰鎮潼軍此亦異也余叔父博士為華州幕官故知其詳或以為褒所獻為璧未知孰是洛陽牡丹歲久蟲蠧則花開稍小園户以硫黃簮其穴蟲死復盛大其園户相妬則以烏賊魚刺花樹枝皮中花必死盡牡丹忌此魚耳司馬溫公既居洛每對客賦詩談文或投壺以娛賔公以舊格不合禮意更定新格以為傾邪險詖不足為善而舊圖反為竒箭多與之算如倚竿帶劒之類今皆廢其算以罰之顛倒反覆惡之大者奈何以為上如倒中之類今當盡廢壺中算以明逆順大抵以精審者為上偶中者為下使夫用機徼幸者無所措手此足以見公之志雖嬉戲之間亦不忘於正也唐彥猷清簡寡欲不以世務為意公退居一室蕭然終日默坐惟吟詩臨書烹茶試墨以此度日嘉祐中守青得絲石於黑山琢為硯其理紅黃相參文如林木或如月暈或如山峰或如雲霧花卉石自有膏潤泛墨色覆之以匣數日不乾彥猷作硯録品為第一以為自得此石端溪龍尾皆置不復視矣秦武公作羽陽宫在鳯翔寶雞縣界歲久不可究知其處元祐六年正月直縣門之東百步居民權氏濬池得古銅瓦五皆破一獨完瓦靣徑四寸四分面上隱起四字曰羽陽千歲字隨勢為之不取方正始知即羽陽舊趾也其地北負髙原南臨渭水前對羣峰形勢雄壯真勝地也武公之初年距今千有七百八十八年吳武功游景叔方總秦鳯刑獄摹刋于石置之岐陽憲臺之瑞豐亭以貽好事者李謙溥太祖朝名將在汾晉二十餘年大小百餘戰未嘗少䘐每巡邊老幼望拜呼以為父晚治第於道坊中為小圃購花木竹石植之頗與朝士大夫游久之以從弟謙升女適皇子陳王貧無以資圃質於宋延偓後其子正為通事舍人侍太宗問曰爾父力邊三十年止餘一第忍屬它姓正具所以對太宗即遣中使出內府錢付延偓購還王禹稱作記美其事名二亭曰克家肯構宰相畢士安而下及諸名公賦詩紀述自成一編秀州祥符院僧知和蓄一古琴琴徽碧石細紋軫製作精巧音韵清越中刋李陽氷三十九字其略云南海夷島産木名伽羅文橫銀屑其堅如石遂用作此臨嶽沈括筆談朱長文琴譜著此琴即唐相􅊈公李勉所製響泉之名見李勉傳元祐末和死州將以其琴匣送尚書禮部符太常長管好事者時時鼓之錢塘沈振蓄一琴名冰清腹有晉陵子銘云卓哉斯器樂惟至正音清韵古月澄風徑三餘神爽泛絶機靜雪夜敲氷霜天擊磬隂陽潛感否臧前鏡人其審之豈獨知政大厯三年三月三日上底蜀郡雷氏斫鳯沼內書貞元十一年七月八日再修士雄記聲極清實山荏陳聖與名知琴少在錢塘從振借琴彈酷愛之後三十年聖與官太常㑹振姪述鬻氷清索百千不售未幾述卒其妻得二十千鬻於僧清道轉落于太一道士楊英久之聖與以五十千購得極珍祕之或以晉陵子杜牧之道號法類李義山筆亦莫可辨又不知士雄何人也釋晉明齊州人久止靈嵓晚遊五臺得風疾眉髮俱墮百骸腐潰哀號苦楚人不忍聞忽有異人教服長松明不之識復告云長松長古松下取根餌之皮色薺苨三五寸味微苦類人參清香可愛無毒服之益人兼解諸蟲毒明採服不旬日髮復生顔貌如故今并代間士人多以長松參甘草乾山藥為湯殊佳然本草及諸方書並不著獨釋惠祥作清凉傳始叙之元祐中上元駕幸迎祥池宴從臣教坊伶人以先聖為戲刑部侍郎孔宗翰奏唐文宗時嘗有為此戲者詔斥去之今聖君宴犒群臣豈宜容此詔付檢官置于理或曰此細事何足言孔曰非爾所知天子春秋鼎盛方且尊德樂道而賤伎乃爾䙝慢不治豈不纍聖德乎聞者歎服椰子生安南及海外諸國木如棕櫚大者高百餘尺花白如千葉芙蓉一本花不過三五顆其大如斗至差小外有黃毛軟皮中有殼正類檳榔故有人為詩云百果之中爾最珍檳榔應是汝𤣥孫沈佺期亦有題椰子詩云叢生雕胡首圓實檳榔身殼止有二冗牙出冗中殼內類羅蔔皮味苦肉極甘脆蠻人甚珍之中有汁大者一二升蠻人謂之椰子酒飲之得醉交州記以為漿者是也治消渴塗髭髮立黑皮煮汁止血療吐逆肉益氣生風蜀雖阻劒州之險而郡縣無城池之固民性懦弱俗尚文學而世以為蜀人好亂殊不知公孫述及劉闢王建孟知祥輩率非土人皆以姦雄乘中原多事盜據一方耳本朝王小波李順王均輩嘯聚西蜀蓋朝廷初平孟氏蜀之帑藏盡歸京師其後言利者爭述功利置博易務禁私市商賈不行蜀民不足故小波得以激怒其人曰吾疾貧富不均今為汝均之貧者附之益衆向使無加賦之苦得循良撫綏之安有此亂古人云與其蓄聚斂之臣寧蓄盜臣聚斂之為害如此可不戒哉犀之類不一生雍管之內及交趾者角紋如麻實燥少溫潤來自船上生大食者文如茱茰理潤而澤光采徹瑩甚類犬鼻若傅以膏甚有花紋而尤異者曰通天犀或如日星或如雲月或如葩花或如山水或飛走或龍魚或成神仙或成宫殿至有衣冠眉目杖履毛羽鱗角完具若繪畫然為世所貴其價不資莫知其所以然也或以為犀愛一物玩之久則物形潜入角中是又不可以理推者其紋有正插者有腰鼓插者其類不一方其未解也雖海人亦未知其為異也故波斯以𧰼牙為白暗犀角為黑暗以其難别識也犀之有通天紋者自顧其影則怖常飲濁水不欲照見其角也海人之取犀也多於山麓植木如列羊棧久則木朽犀前足短止則依木而立木折犀倒不能自立因格殺之犀歲亦退角培土埋僻處海人偵知以木角易取之西域謂犀為竭伽角為毗沙拏言一角也柳三變景祐末登進士第少有俊才尤精樂章後以疾更名永字耆卿皇祐中久困選調入內都知史某愛其才而憐其潦倒㑹教坊進新曲醉蓬萊時司天臺奏老人星見史乘機薦之仁宗大悅澠水燕談録卷九
