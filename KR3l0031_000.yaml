body:
  text: 澠水燕談録小說家類一雜事之屬提要臣等謹案澠水燕談録十卷舊本題宋齊國王闢之撰宋藝文志作王關之蓋闢關形近而誤通考引朝陳二家書目作王闢疑傳寫脫之字也書録解題稱其為治平四年進士讀書志稱其從仕四方與賢士大夫燕談有可取者輒記久而得三百六十餘事今考此書皆記紹聖以前雜事分十五類帝德十七條讜論十一條名臣五十條知人四條竒節十二條忠孝八條才識十二條髙逸二十條官制二十條貢舉二十一條先兆十七條歌咏十八條書畫八條事志三十二條雜録三十五條共二百八十五條與讀書志所載之數不合蓋此本為明商濬稗海所刻有所刪削故也所記質實可信多與史傳相出入其間如誰傳佳句到幽都詩乃蘇轍使遼時寄其兄軾之作而誤以為張舜民又如栁永以夤緣中官獻醉蓬萊詞為仁宗所斥而以為仁宗大悅之類雖間有舛訛正不以一眚掩耳乾隆四十三年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:d0d6ac729f4dfd4d6208348d15a37362bb06f501adf724d27a77e8da4b33e780
