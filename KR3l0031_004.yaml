body:
  text: 澠水燕談錄卷四宋王闢之撰忠孝咸平中契丹舉國来侵南至淄青淄川小郡城壘不完刺史吏民皆欲棄城奔於南山兵馬監押張藴按劍厲聲曰奈何去城隍委府庫大衆一潰更相勦奪敵未至而吾已殘矣刺史若出吾當斬以狥由是無敢動者後君為環州馬嶺鎮監押雖處窮塞猶建孔子祠刻石為之記慶厯中范文正公過其地書其碑陰以美之其子揆掞以文學才行有名於世皆登侍從鈆山劉輝俊美有辭學嘉祐中連冠國庠及天府進士四年崇政殿試又為天下第一得大理評事簽書建康軍判官喪祖母乞辭官以嫡孫承重服國朝有諸叔而嫡孫承重服者自輝始哀族之人不能為生者買田數百畝以養之四方之人從輝學者甚衆乃擇山溪勝處處之縣大夫易其里曰義榮社名其館曰義榮齋未終喪而卒士大夫惜之初范文正與吳文肅皆有志義田及後登二府方能成其志而輝於初仕家無餘資能力為之士君子尤為難自唐末用兵文臣給舎以上武臣刺史以上喪父母者急於國事以義斷哀徃徃以墨縗從事既泣哀則涖事如故號曰起復國朝襲唐制不改論者慶厯中田元均帥秦鳳奏乞解官終喪既葬託邊事求見上曰陛下以孝治天下方邊隅無事而區區犬馬之心不得自從因泣下上視其貎瘠乃許終喪其後富公以宰相丁母憂仁宗詔數十竟終喪盖大臣終喪自公始皇祐四年五年儂智髙寇二廣諸郡皆棄城避賊獨贊善大夫知康州趙師旦太子中舎知封州曹覲城守死方賊之至康州也贊善閲兵得羸兵二百餘人扼戰斬賊千人明日兵盡城破詬賊賊度不可屈害之時方暑越三日屍不可視獨姿色如生初夫人王氏避冦女生始三日棄之草間信宿囘視無苦人以為忠義之感賊平朝廷贈光祿少卿而康民立祠以祀丞相王荆公誌其葬博士梅聖俞表其墓慶厯末妖賊王則盜據貝州賈魏公鎮北門倉卒遣將引兵環城未有破賊之計公日夜憂思有指使馬遂者白公曰堅城深池不可力取願得公一言入城殺元兇餘黨可説而下也公壯其言丁寕囑之曰壯士立功在此行也遂至城下浮渡濠呌呼守城者乗匹練縋身以上見賊偶坐為陳朝廷恩信能束身為公請於朝亦不失富貴若守迷天子遣一將提兵不日城下血膏地肉飽犬悔無及矣辭激切賊不荅遂度終不聴遂争擊賊仆地扼其㗋㡬死左右兵之聞者莫不義之是時翰林鄭毅夫方客魏為之作傳榮州張昭及剛毅不畏强禦故為櫟陽主簿陳堯咨庄僕恃勢干縣政輸賦不以時昭及捕而杖之堯咨聞而嘆曰張子一主簿而能如此他日當薦為御史使人召之昭及竟不見唐貞觀中調卒戍邊河中府永樂縣民姚棲雲之父以兄嗣未立請代兄行遂戰沒時棲雲方三嵗其母再嫁鞠於伯母其母亡棲雲葬之又招魂葬其父廬於墓終身哀慕不衰河中尹渾瑊上其事詔加優賜旌表其鄉棲雲十世同居仁宗詔賜旌表復其徭役又三世自慶厯至今又五十年而其家孝友如故永樂縣熙寕初幷𨽻河東余元祐中以列於府乞特賜敷奏下其事史官重加旌表特免戸徭錢以旌孝義以厲風俗狀上不報曹修古明道初為御史上書乞莊獻太后還政謫守興化軍暴疾終於官家貧死之日無衣以殮郡之僚屬若吏民之賢者莫不號慕嘆息相與出錢帛數十萬賻其家曹女始笄泣語其母曰先人忠節名聞天下不幸以直言謫死且君子不家於喪安可受以凂我先人之全徳哉哭不已謝而遣之吏民固乞卒不受一錢其純孝髙尚如此曹建安人四御史之一也才識盧朱崖父億性儉素恬於榮進以少府監告老歸洛以棋酒自放不親俗事及多遜叅大政服玩漸侈億嘆而泣曰家本寒素今富貴驟至不知税駕地矣後多遜果敗士大夫髙其識劉少逸少有俊才年十三端拱二年中禮𨕖及御試詩賦外别召升殿賜御題賦詩數首皆有㫖意授校書郎令於三館讀書故王元之愛其少俊而贈之詩曰待學韓退之矜夸李長吉胡旦少有俊才尚氣凌物嘗語人曰應舉不作狀元仕宦不作宰相虛生也隨計之秋郡守坐中聞鴈賦詩曰明年春色裏領取一行歸人皆壯其言明年果魁天下終以忤物不登顯位以文辭敏麗見推一時晩年病目閉門閑居一日史館共議作一貴侯傳其人少賤嘗屠豕猪史官以為諱之即非實錄書之即難為辭相與見旦旦曰何不曰某少嘗操刀以割示有宰天下之志莫不嘆服天聖末歐陽文忠公文章三冠多士國學補試國學解禮部奏登甲科為西京留守推官府尹錢思公通判謝希深皆當世偉人待公優異公與尹師魯梅聖俞楊子徳張太素張堯夫王㡬道為七友以文章道義相切劘率常賦詩飲酒間以談戲相得尤樂洛中山水園亭塔廟佳處莫不逰覽思公恐其廢職事㣲戒之一日府㑹語及冦萊公思公曰知萊公所以取禍否由晩節奢縱宴飲過度耳文忠曰宴飲小過不足招禍萊公之責由老不知退爾坐客為之聳然思公年已七十蘇子美有逸才詞氣俊偉有超世之格慶厯中監奏邸承舊例以拆賣故紙錢祠神因以其餘享賔客言事者欲因子美以累一二大臣彈擊甚急宦者操文符捕人送獄皆一時名士都下為之紛駭左右無敢救解者獨韓魏公從容言於仁宗曰舜欽一醉飽之過止可薄治之何至如此帝悔見於色魏公之仁厚愛賢可尚矣明道末天下蝗旱知通州吳遵路乗民未饑募富者得錢萬貫分遣衙役航海糴米於蘇秀使物價不增又使民採薪官為收買以其直糴官米未至冬大雪即以元價易薪芻與民官不傷財民且蒙利又建茅屋百間以處流民捐俸錢置辦鹽蔬日與茶飯叅俵有疾者給藥以理其願歸者具舟續食還之本土是嵗諸郡率多轉死惟通安堵不知凶嵗故民愛之若父母明年范文正按撫淮浙上公績狀頒下諸郡熙寕中予官於通繼公之治逾四十年猶詠誦未已康定中河西用兵石曼卿與安道奉使河東既行安道晝訪夕思所至郡縣考圖籍見守令按視民兵芻粟山川道路莫不究盡利害尚慮未足以副朝廷眷使之意而曼卿吟詩飲酒若不為意者一日安道曰朝廷不以遵路不才得與曼卿並命今一道兵馬糧餦雖已留意而竊懼愚不能燭事以曼卿之才如略加之意則事無遺舉矣曼卿笑曰國家大事安敢忽邪已熟計之矣因條舉將兵之勇怯芻糧之多寡山川之險易道路之通塞纖悉具備如宿所經慮者安道乃大驚服以為天下竒才且嘆其不可及也眉山蘇洵少不喜學㡬壯猶不知書年二十七始發憤讀書舉進士又舉茂才皆不中曰是未足為吾學也焚其文閉户讀書五六年乃大究六經百家之説嘉祐初與二子軾轍至京師歐陽文忠公獻其書於朝士大夫争傳其文二子舉進士亦皆在髙等於是父子名動京師而蘇氏文章擅天下邵迎髙郵人博學强記文章清麗而尤長於詩為人恭儉孝友頗精法律長於吏事而清羸多病尫然不能勝衣平生竒蹇不偶登進士十餘年而官止州縣窮死無嗣其妻困苦蘇子瞻哀䘏之又萃集其文為之引以為原憲之貧顔囘之短命揚雄之無子馮衍之不遇皇甫士安之篤疾彼遇其一人猶哀悼而君兼之非命也哉子瞻文章議論獨出當世風格髙邁真謫仙人也至於書畫亦皆精絶故小落手即為人藏去有得真迹者重於珠玉子瞻雖才行髙世而遇人温厚有片善可取者輒與之傾盡城府論辯唱酬間以談謔以是尤為士大夫所愛間遭僉人媒孽謫居黃州有陳處士者擕紙筆求書於子瞻㑹客方鼓琴遂書曰或對一貴人彈琴者天陰聲不發貴人恠之曰豈弦慢邪對曰弦也不慢子瞻之清談善謔皆此𩔖也翰林沈公遘為京尹敏於政事號稱嚴明平時治開封者晨起視事至暮不能已甚者或廢飲食公尹府旦晝決事日中府無留人出謝客從容談燕日有餘力而翕然稱治太子中舎于燾彭年青州壽光人博學能文喜言兵富文忠公丁文簡公薦堪將領以為武學教授慶厯中元昊數冦邊契丹乗釁聚兵求關南地丞相吕文靖公召彭年計之彭年云逺域不可校義理今幸嵗徳在我為主者勝宜治西北行宫若將親征者以壓其謀乃以大名府為北都未㡬西夏請盟契丹通好吕丞相稱之彭年謝不復見慶厯末仁宗春秋髙皇嗣未立登州岠嵎山數震郡以言彭年上疏曰岠嵎極東方殆東朝未建人心揺動之象宜早定儲以安天下之心且言宜以齊為節度逮英宗入繼乃由齊邸遂為興徳軍以先識稱之澠水燕談錄卷四
