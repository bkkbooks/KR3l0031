body:
  text: 澠水燕談録卷十宋王闢之撰雜録唐太宗問一行世數禪師製葉子格進之葉子言二十世李也當時士大夫宴集皆為之其後有柴氏趙氏其格不一蜀人以紅鶴格為貴禁中則以花蟲為宗近世職方員外郎曹谷損益舊本撰舊歡新格尤為詳宻其法用匾骰子六隻犀牙師子十事自盆帖而下分十五門門各有説凡名彩二百二十七逸彩二百四十七總四百七十四彩余家有其格而世無能為者周顯德中許京城民居起樓閣大將軍周景威先於宋門内臨汴水建樓十三間世宗嘉之以手詔奬諭景威雖奉詔實所以規利也今所謂十三間樓子者是也景威子瑩國初為樞宻使陶糓姓唐唐宰相莒公儉之後祖彦謙有詩名號鹿門先生糓避留祖名改姓陶後歴事累朝不復還本姓士大夫譏之劉鋹㨿嶺南兵置八千人專以採珠為事目曰媚川都每以石硾其足入海至五七百人溺而死者相屬也久之珠充積内庫所居殿宇梁棟簾箔率以珠為飾窮極華麗後王師入一火而盡藝祖廢媚川㸃其壯者為軍老者放歸田里仍詔百姓不得以採珠為業建隆中南都一夕星殞如雨㸃或大或小光彩燁然未至地而滅景祐初忻州夜中星殞極多明日視之皆石聞今忻民猶有蓄之乃知公羊傳以雨星不及地而復其説得之左氏以如雨而言與雨偕非也幽薊八州陷契丹幾二百年其間英主賢臣欲圖收復功垂成而輙廢者三矣此豪傑之士每每嘆嗟而痛惜初周世宗既下關南欲乗勝進攻幽州將行夜中疾作乃止藝祖貯財别庫欲事攻取㑹上仙乃寢柳仲塗守寧邊今博野也結客白萬德使説其主帥將納質定誓以為内應掩其不備疾趨直取幽州㑹仲塗易地河朔之人迄今為憾國初有王彦升者本市井販繒人及壯從軍累立戰功至防禦使性極殘忍俘獲邊人則置酒宴飲因引羌人以手攝其耳對客咀嚼徐引巵酒邊人血流被面彦升笑語自若前後噉數十百人亦可恠也開寶中鄢陵許永為鄆州盧縣尉自言七十五歳其父瓊年九十九長兄八十一次兄七十七藝祖召瓊問唐李事對尤詳賜以衣幣鞍馬父子俱享福夀世罕有也盧丞相多遜謫死朱崖旅殯海上天慶觀道士練惟一夜聞窻外有人讀書審其聲韵有𩔖多遜明日有詩題窻外曰南斗微茫北斗明喜聞窻下讀書聲孤魂千里不歸去辜負洛陽花滿城筆迹亦𩔖之明年歸葬洛此説得之孫巨源而楊文公云其子全扶柩歸葬江陵佛舍與此不同未知孰是姑兩録之髙麗海外諸國中最好儒學祖宗以來數有賔客貢士登第者自天聖後十年不通中國熈寧四年始復遣使脩貢因泉州黄愼者為鄉導將由四明登岸比至為海風飄至通州謝太守云望斗極以乗槎初離下國指桃源而迷路誤到仙鄉詞甚切當使臣御事民官侍郎金第與行朴寅亮詩尤精如泗州龜山寺詩云門前客棹洪濤急竹下僧棋白日閒等句中土人亦稱之寅亮為其國詞臣以罪廢之復與金第使中國盧多遜南遷朱崖逾嶺憇一山店店嫗舉止和淑頗能談京華事盧訪之嫗不謂盧也曰家故汴都累代仕族一子事州縣盧相公違法治一事子不能奉誣竄南方到方周歳盡室淪喪獨殘老軀流落居此意有所待盧相欺上罔下倚勢害物天道昭昭行當南竄未亡間庶見於此以快宿憾爾因號呼泣下盧不待食促駕而去景德中邠州有神祠凡民祈禱者神必親享盃盤悉空遠近奔赴蓋穴神座下通寢殿複門綉箔人莫得窺羣狐自穴出分享肴醴王公嗣宗雅負剛正及鎭邠土乃騎兵挾矢驅鷹犬投薪穴中縱火焚之羣狐奔逸擒殺悉盡鞭廟祝毁其祠妖狐遂絶初公在長安也極疏种山人放之短好事者有詩云終南隱士聲名歇邠土妖狐窠穴空二事俱輸王太守聖朝方信有英雄楊光遠之叛青州也有孫中舍忘其名居圍城中族人在州西别墅城閉既久内外隔絶食且盡舉家愁嘆有畜犬傍徨其側有憂思中舍因囑曰爾能為我至莊取米邪犬揺尾應之至夜置之一布囊并簡繫犬背上犬即由水竇出至莊鳴吠居者開門識其犬取簡視之令負米還未曉入城如此數月此至城開孫氏闔門數十口獨得不餒孫氏愈愛畜之後數年斃葬於别墅之南至其孫彭年語龍圖趙公師民刻石表其墓曰靈犬誌仁宗天縱多能尤精書學凡宫殿門觀多帝飛白題榜勲賢神道率賜螭首王曾之碑曰旌賢㓂準曰旌忠李廸曰遺直晏殊曰舊學丁度曰崇儒王旦曰全德元老文彦博父均曰教忠積慶李用和曰親賢范仲淹曰褒賢曹利用曰旌功吕夷簡曰懷忠張士遜曰舊德狄青曰旌忠元勲其餘不可悉記或云初王子融守河中模唐明皇題裴耀卿碑額獻之仁宗乃賜文正碑曰旌賢大臣碑額賜蓋始於此其後英廟神考亦屢有賜者祥符初王旭知潁州因歳饑出庫錢貸民約蠶熟一千輸一縑其後李士衡行之陜西民以為便今行於天下於歳首給之謂之和買絹或曰預買始於旭也汀州王捷少商江淮間咸平初遇一人於南康逆旅衣道士服儀狀竒俊屢見之授以黄金術仍付以神劒且戒之曰非遇人君不可妄泄後佯狂呌呼上饒市中配流嶺南迯歸京撾登聞鼓自陳上召與語悦之命之官更名中正寓居中官劉承珪家珪上言數聞中正與之語聲如童子云我司命中君也中正後遷神武大將軍康州團練使常以藥金銀獻上以助國費卒贈嶺南節度使世謂之燒金王先生建祠永寧院西至今御府猶有中正所獻金及罏鑪有殘藥直史舘孫公冕文學政事有聞於時而賦性剛明以别白賢不肖為事天禧中連守數郡暇日接僚吏殊不喜談朝廷除授亦未嘗覽除目每邸吏報狀則納懷中不復省事或詰其意曰某人賢而反沉下位某人不才而驟居顯官見之令人不快爾或譏其不廣然其好賢嫉惡之心亦可尚也曹襄悼公利用天聖中退朝歸私第中衢逢狂人奪其樞宻使印心獨惡之未幾姪芮為不法事敗治獄者鍜成其事芮死公貶隨州再貶房陵行至襄陽監者迫自盡天下寃之平原劉永錫天聖末以虞曹外郎知千乗縣一日與門生對食永錫以饅頭食畜犬生曰犬彘食人食古人所譏况珍味耶犬不食瞋視之以去數日不知所在一夕犬至跪門閾將入生起視之知其將害己卷衾作人卧床上升棟避之犬入登床噬之覺非人吼怒出户擲尾作聲而死今夫衣士人衣冠首䑕貴游門下以獵哺啜嗟來不愧曾斯犬之不若也慶厯中皇叔燕王元儼薨仁宗追悼尤深詔有司擇立號之尤尊美者以尊榮之乃特贈天䇿大將軍非常典也王性嚴毅威望著於天下士民識與不識呼之曰八大王契丹尤憚之諌議大夫崔頌博學君子人也性有疑疾防閑閨門過于嚴宻圬者塗室以帛幕其目恐竊視其私也與夫羅灰扃户殆不遠李尚書公擇少讀書於廬山五老峰白石庵之僧舍書幾萬卷公擇既去思以遺後之學者不欲獨有其書乃藏於僧舍其後山中之人思之目其居云李氏藏書山房而子瞻為之記江隂軍北距大江地僻鮮過客無將迎之煩所𨽻一縣公事絶少通州南阻江東北濵海士夫罕至居民魚鹽自給不為盜獄訟希簡仕宦二州者最為優逸故士夫以江隂為兩浙道院通州為淮南道院舊説虎有威遇人百歩之外咆哮作聲以威懾人人或不懼虎反畏而去故虎不食醉人小兒不知懼則虎畏而不食蘇子由作孟德傳以為德禁卒既迯不顧死見虎不為動弭耳而去蕭榔字大珎後梁宗室為青州刺史有惠愛篤信於民及死民為立祠千乗縣西相與謚曰信公嘉祐中祠宇頽敝主廟者賈天恩老伶也有王乂者金家蒼頭也幼苦痛寒汗不洽病腰不能行僂而丐且十年一旦人灸之遂愈天恩教之曰第云信公召語能為吾脩廟則使爾腰伸諾之腰即伸於是遠近聞之凑奔爭施錢帛以新廟貌踰年得錢數千緡功未卒而二人爭錢相毆事稍諠施者因不復來熈寧八年淮西大饑人相食朝廷遣近臣安撫同監司賑濟而措置乖戾不能副朝廷愛飬元元之意安撫先檄郡縣以厚朴燒荳腐開饑民胃口提刑司督諸郡多造紙襖為衣而又得稻田居之安撫可無慮矣聞者大慚朝廷知之重行降黜熈寧中淮西連歳蝗旱居民艱食通泰農田中生菌被野饑民得以採食元豐中青淄荐饑山中及平地皆生白麫白石如灰而膩民有得數十斛以少麫同和為湯餅可食大濟乏絶二事頗異皆所目見陳亞少卿蓄書數千卷名畫數十軸平生之所寶者晩年退居有華亭雙鶴怪石一株尤竒峭與異花數十本列植於所居為詩以戒子孫滿室圖書雜典墳華亭仙客岱雲根他年若不和花賣便是吾家好子孫亞死未幾皆散落民間矣小詞有燒殘絳燭淚成痕街鼓破黄昏之語或以為黄昏不當燭已見䟦解者曰此草廬窶陋者之論殊不知貴侯戚里洞房宻室深邃窈窕有不待夜而張燭者矣士大夫筵饌率以䬪飥或在水飯之前予近預河中府蒲左丞㑹初坐即食䬪飥予驚問之蒲笑曰世謂䬪飥為頭食宜為羣品之先可知矣意其唐末五代亂離之際失其次序久抑下列頗欝輿論牽復坐客皆大笑王承衍尚秦國賢肅大長公主至曾孫師約又尚惠和公主子植又選尚惠國公主昔漢竇氏一門三公主於時親戚功臣莫與比唐薛儆與其子鏽相繼尚睿宗明皇女獨稱唐氏而尚三公主又父子相繼惟王氏一門江南一縣郊外古寺地僻險邑人罕至僧徒久苦不足一日有游僧方至其寺告於主僧且將與之謀所以驚人耳目者寺有五百羅漢擇一貌𩔖己衣其衣頂其笠䇿其杖入縣削髪誤為刀傷其頂解衣帶取藥傅之留杖為質約至寺將遺千錢削者述所以得杖貌相與見主僧更異之開羅漢堂門鏁生凝塵榻如久不開者視之此羅漢衣笠皆所見者頂有傷處血漬藥傅如昔前有一千皆古錢貫且朽因共嘆異之傳聞遠近施者日至寺因大盛數年其徒有爭財者謀稍泄得之外氏元豐中髙麗使朴寅亮至明州𧰼山尉張中以詩送之寅亮答詩序有花面艷吹愧隣婦青唇之動桑間陋曲續郢人白雪之音之語有司劾中小官不當外交髙麗奏上神宗顧左右青唇何事皆不能對乃問趙元老元老奏不經之語不敢以聞神宗再諭之元老誦太平廣記云有覩隣夫見婦吹火贈詩云吹火朱唇動添薪玉腕斜遥看烟裏面恰似霧中花其妻告夫曰君豈不能學也夫曰君當吹火吾亦効之夫乃為詩云吹火青唇動添薪墨腕斜遥看烟裏面恰似鳩槃茶元老之强記雖怪僻小説無不該覽國初襲唐末士風舉子見先達先投刺謂之請見既與之見他日再投啓事謂之謝見又數日再投啓事謂之溫卷或先達以書謝或有稱譽即别裁啓事委曲叙謝更求一見當時舉子之於先達者其禮如此之恭近歳不復行此禮而上官亦鮮有延譽後進者錢鏐之㨿錢塘也子跛鏐鍾愛之諺謂跛為瘸杭人為諱之乃稱茄為落蘇楊行宻之㨿淮陽淮人避其名以蜜為蜂糖由乎淮浙之音訛也以瘸為茄以蜜為宻良可笑也澠水燕談録卷十
