body:
  text: 澠水燕談録卷二宋王闢之撰名臣宰相王溥父祚少為太原掾屬宿州防禦使既老溥勸其退居洛陽居常怏怏及溥為相客或候祚溥常朝服侍立客不安席求去祚曰學生勞賢者起避耶張忠定公詠布衣時希夷先生一見竒之曰願分華山一半居可乎先生曰非公可及别贈以毫楮公曰是將嬰我以世務也後公貴顯以名德重天下將赴劒南以詩寄先生曰性愚不肯林泉住強要流清擬致君今日星馳劒南道回頭慚愧華山雲及還又有詩曰世人大抵重官榮見我東歸夾道迎應被華山髙士笑天真喪盡得虛名王元之嘗草李繼遷制繼遷送馬五十匹潤筆公卻之後守永陽閩人鄭褒有文行徒步謁公及還公買一馬遺之或謗其虧價者太宗曰彼能卻繼遷五十匹顧肯虧一匹馬價邪曹冀王彬前後帥師征討諸國凡降四國主江南西川廣南湖南也未嘗殺一無辜功名顯著為諸將之首諸子賢令瑋琮璨繼領旄鉞陶弼觀王畫像有詩曰搜兵四解降王縛教子三登上將臺其後少子玘追封王爵實生光憲太后輔佐仁宗母儀天下纍朝聖功仁德天下懷慕以至濟陰生享王爵子孫昌熾世世無比非元功陰德享報深厚何以及此雖漢之馬郭逮無以過此嗚呼盛哉張僕射齊賢以吏部尚書知青州六年其治安靜民頗安之好事者或謗其居官弛慢朝廷召還公語人曰向作宰相幸無大過今典一郡乃招物議正如監御厨三十年臨老反煮粥不了士大夫聞之深罪謗者曾孫仲平為豫言真宗晏駕二府受遺制輔立仁宗及皇太后權聽斷軍國事宰相丁謂欲去權字王沂公時參大政獨報之曰皇帝沖年太后臨朝斯非國家常典稱權猶足示後况言猶在耳何可改也謂深感其言權字遂不敢去祥符中趙德眀上言本國飢來借粟百萬斛大臣皆請以違誓責之王魏公旦獨請具粟如其數於京師詔德明入京來取德明大慚嘆朝廷有人真宗朝宦者劉承圭以端謹事上病且死求為節度使上促授之王魏公旦執不從曰復有求為樞密使者何以絶之至今宦者官不過留後王魏公旦與楊文公大年交善疾篤大年問於卧內託草遺奏言為宰相不可以將盡之言為宗親求官但敘平生遭遇之意表上真宗嘆之遽遣就第名數進録諫議大夫陳省華生三子皆登進士第而伯仲皆為天下第一晚年燕國夫人馮氏俱康寧長子堯叟知樞密院次子堯佐直史館少子堯咨知制誥每對客三子列侍客不自安求去省華曰學生輩立侍常也士大夫以陳氏為榮朝文元公迥少聞方士之術凡人耳有靈響目有神光其後聽於靜中若鈴聲逺聞耆年之後愈覺清徹公名之曰三妙音一曰幽泉潄玉二曰清聲搖空三曰秋蟬曵緒嘗聞其裔孫端禮云景德中朝廷始與契丹通好詔遣使將以北朝呼之王沂公以為太重請但稱契丹本號可也真宗激賞再三朝論韙之祥符中王沂公奉賜契丹館伴耶律祥頗肆談辨深自衒鬻且矜新賜鐵券沂公答以勳臣有功髙不賞之懼故賜劵以安反側耳何為輒及親賢祥大沮真宗上仙時雖仲春而大雪苦寒莊獻太后詔賜衛士酒獨王德用所轄禁旅不得飲后以問德用德用曰衛士荷先帝恩德厚矣今率土崩心安忍縱飲矧嗣君尚少未親萬機不幸一夫􅒬酒奮臂狂呼得不動人心也后大嘆息李文靖公為相王魏公旦方參預政府時西北尚用兵或至旰食魏公嘆我輩安能坐致太平得優遊無事耶文靖公曰少有憂勤足為警戒他日四方寧謐朝廷未必無事其後北方講和西夏納欵而封禪祠祀搜講墜典靡有虛日魏公始嘆文靖之先識過人逺矣乾興初丁謂欲每議大政則太后後殿朝執政朔望則皇帝前殿朝羣臣其餘常事獨令入內押班雷允恭附奏禁中傳命三府衆以為隔絶中外不便王沂公時判禮院引東漢故事皇帝在左太后在右同殿加簾中書樞密院以次奏事人心乃安皇祐五年儂智髙陷二廣詔樞密副使狄青督諸將討之言事者以青武人不可専用請以文臣副之仁宗以問龎莊敏公曰向者王師所以屢敗由大將不足以統一禆將人人自用故遇敵輒北劉平已來敗軍覆將莫不由此青勇敢有智略善用兵必能平賊願勿憂仁宗乃詔行營諸軍皆受青節制賊平處置民事則與孫沔余靖同議及捷報至上喜謂莊敏曰嶺表平殄皆卿之力也皇祐五年王汾擢進士甲科唱名日左右奏汾免解進士例當降甲仁宗覽家狀曰汾先朝學士禹稱曾孫遂不降甲其後汾以便糴賞勞改官亦以黃州孫超升朝籍景祐中范文正公以言事觸宰相黜守饒州到任謝表云此而為郡練優優布政之方必也立朝增蹇蹇匪躬之節天下嘆公至誠許國始終不渝不以進退易其守也宋范文正公以龍圖閣直學士帥邠延涇慶四郡威德著聞中外聳服屬户蕃部率稱曰龍圖老子至於元昊亦以是呼之太子賔客謝濤生平清慎恬於榮利晚節乞知西臺尋分務洛中接賔客屏去外事日覽舊史一編以待賔話將終前一日夢中見詩一章覺呼其孫景初録之曰百年事業一張紙千古英雄一窖塵惟有炳然周孔教至今仁義浸生民足以見仁義著乎神明故至死而不亂也皇祐末契丹請觀太廟樂仁宗以問宰相對曰恐非享祀不可習也樞密副使孫公沔曰當以禮折之請謂使者廟樂之作皆本朝廷所以歌詠祖宗功德也他國可用邪使人如能助吾祭乃觀之使者不敢復請陳文惠將終前一日自為墓志曰宋有潁川先生堯佐字希元道號知餘子年八十不為夭官一品不為賤使臣納祿不為辱三者粗備歸息於先秦國大夫仲兄丞相棲神之域吾何恨哉范文正公貶饒州朝廷方治朋黨士大夫莫敢往别王待制質獨扶病餞於國門大臣責之曰君長何自陷朋黨王曰范公天下賢者顧質何敢望之若得為范公黨人公之賜質厚矣歐陽文忠公使遼其主每擇貴臣有學者押宴非常例且曰以公名重今代故爾景祐末西鄙用兵大將劉平死之議者以朝廷使宦者監軍主帥節制有不得專者故平失利詔誅監軍黃德和或乞罷諸帥監軍仁宗以問宰臣文靖公曰不必罷但擇謹厚者為之仁宗委公擇之對曰臣待罪宰相不與中貴私交無由知其賢否願詔都知押班保舉有不職與同罪仁宗從之翊日都知叩首乞罷諸監軍士大夫嘉公有謀景祐中范文正公知開封府忠亮讜直言無回避左右不便因言離間大臣自結朋黨仍落天章閣待制黜知饒州余靖安道上疏論救以朋黨坐貶尹洙師魯言靖與仲淹交淺臣與仲淹義兼師友當從坐貶監郢州稅歐陽修永叔貽書責司諫髙若訥不能辨其非辜若訥大怒繳其書降授夷陵縣令永叔復與師魯書云五六十年來此輩沈默畏怖在世間忽見吾輩作此事下至竈間老婢亦為驚怪時蔡君謨為四賢一不肖詩布在都下人爭傳寫鬻書者市之頗獲厚利遼使至密市以還張中庸奉使過幽州館中有書君謨詩在壁上四賢希文安道師魯永叔一不肖謂若訥也狄武襄公青初以散直為延州指使是時西邊用兵公以才勇智略頻立戰功常披髮面銅具馳突出圍敵人畏懾無敢當者公識度宏逺士大夫翕然稱之而尤為韓公范文正公所深知稱為國器文正以春秋漢書授之曰將不知古今匹夫之勇不足尚也公於是博覽書史通究古今已而立大功登輔弼書史策配享宗廟為宋名將天下稱其賢公初為延州指使後顯貴天下獨呼公為狄天使慶厯中仁宗服藥久不視朝一日聖體康復思見執政坐便殿促召二府宰相吕許公聞命移刻方赴召比至中使數促公同列亦贊公速行公愈緩步既見上曰久疾方平喜與公等相見而遲遲其來何也公從容奏曰陛下不豫中外頗憂一旦聞忽召近臣臣等若奔馳以進慮人驚動爾上以為得輔臣之體陳貫自鹽鐵副使除直昭文館知相州先是三司副使例得待制而貫獨得直館或唁貫者貫曰與其居天章作不才待制何如在昭文為有道學士唁者愧服貫子安石今為吏部侍郎女嫁文潞公康定中趙元昊既虜劉平遂約吐蕃毋與中國通陰相為援朝廷患之擇能使絶域者將以恩信譙讓唃氏尚書屯田員外郎劉渙上書請行間道馳至青唐城唃氏皆頓首悔謝請以死捍邊因圖畫其地形并誓書還奏仁宗嘉歎進直昭文館俄而元昊臣服再加刑部郎中賜金紫王武恭公德用寬厚善撫士其貌魁偉而面色正黑雖匹夫下卒閭巷小兒外至逺方君長皆知其名職稱之曰黑相北人常呼其名以驚小兒為四方畏服如此皇祐末仁宗以為樞密使而以富韓公為宰相是冬契丹使至公與之射使者以公為樞密使富公為相稱得人上聞尤喜治平中夏國泛使至將以十事聞於天子未知其何事也時太常少卿祝咨主館伴既受命先見樞府已而見丞相韓魏公公曰樞密何語咨曰樞密云若使人言及十事第云受命館伴不敢輒受邊事公笑曰豈有止主飲食不及他語邪公乃徐料十事以授祝曰彼及某事則以某辭辨言某事則以某辭折祝唯而退及宴見使者果及十事凡八事正中公所料祝如所教答之夏人聳服祝常以魏公真賢相非他人可比元豐中尚書省百官諡曽魯公始曰忠獻禮官劉摰駁曰丞相位居三事不聞薦一士安得謂之忠家纍千金未嘗濟一物安得謂之獻衆不能奪其議改曰宣靖司馬文正公以髙才全德大得中外之望故公之退十有餘年而天下之人日冀其復用熙寧末余夜宿青州北溜河馬鋪晨起行見村民百人歡呼踴躍自北而南余驚問之皆曰傳司馬為宰相矣余以為雖出於野人妄傳亦其情之所素欲也故子瞻為公獨樂園詩曰先生獨何事四海望陶冶兒童誦君實走卒知司馬蓋紀實也元豐七年春文太師既告老奏乞赴闕親辭天陛庶盡臣子之誠既見即日對御錫宴顧問溫渥上酌御盞親勸數日朝辭上遣中使以手劄諭公留清明飭有司令與公備二舟泝汴還洛清明日錫宴玉津園公作詩示同席翊日上用公韻屬和親灑宸翰就第賜公特命三省以上赴瓊林苑宴餞復賜御詩送行公留京師一月凡對上者五錫宴者三錫詩者再顧問不名稱曰太師寵數優異富公熙寧中罷相赴亳常居深養疾罕出時幕府諸公事須稟命常以狀白公公批數字紙尾莫不盡其理或有難決之事諸公憂疑不能措手者相與求見公公以一二言裁處徐語他事諸公曉然率常失其所疑者退而嘆服以為莫可及也公早使遼以片言折敵謀尊中國及總大政視天下事若不足為者矧退處一郡乎韓魏公元勳舊德中外具瞻熙寧留守北都遼使每過境必先戒其下曰韓丞相在此無得過有呼索遼使與京尹書故事紙尾止押字是時悉書名其為遼人尊畏如此每使至必問侍中安否其後公子忠彥奉使遼主問嘗使中國者曰國使類丞相否曰類即命工圖之國朝享國百三十餘年人臣為太師者惟趙忠獻文潞公二人者耳范文正公知邠州暇日率僚屬登樓置酒未舉觴見縗絰數人營理葬具者公亟令詢之乃寓居士人卒於邠將出殯近郊賵殮棺槨皆所未具公憮然即徹宴席厚賙給之使畢其事崔遵度清節純德泊於榮利事太宗為右史十餘年每侍殿陛側身軒楹以自屏蔽不欲當上顧盼其恬晦如此琴德尤髙嘗鼓琴靜室往往通夕妻子罕見其靣慶厯末富文忠公鎮青州會河決商胡北方大水流民坌入京東公勸所撫八州之民出粟以助賑給各因坊村擇寺廟及公私空舍又因山崖為窟室以處流離擇寓居官無職事者各給以俸即民所贅聚籍而受劵以時給之器物薪芻無不完具不幸死者為叢塜收瘞自為文遣使祭之明年夏大稔計其道里資遣還八州之間所活無慮五十餘萬人其募為兵者又萬餘人仁宗嘉之拜公禮部侍郎公曰恤災賑乏臣之職也辭不受嘉祐中仁宗不豫久不御殿雖宰臣亦不得見富文忠公求入視疾內侍以未有詔旨止之公叱之曰安有宰相一日不見天子遂趨入見因乞監侍祈禱留宿殿中自是事無巨細皆白執政而後行上下晏然司馬溫公居洛十五年天下日望以為相神宗上仙公赴闕臨衛士見公皆以手加額曰司馬相公也民遮道曰無歸洛留相天子活百姓所在數千人觀之公懼徑歸詔除知陳州過闕留拜門下侍郎為左僕射及薨京師民刻畫其像家祠一本四方爭購之畫工有致富者孔公道輔以剛毅直諒名聞天下知諫院日請明肅太后歸政天子為中丞日諫廢郭后其後知兗州日近臣獻詩百篇者執政請除龍圖閣直學士仁宗曰是詩雖多不如孔某一言乃以公為龍圖閣學士祥符中天下大蝗近臣得死蝗於野以獻宰臣率百官稱賀王魏公旦獨執不可數日方罷朝飛蝗蔽天真宗嘆曰使百官將賀而蝗遽至豈不為天下笑耶張忠定公詠知通進銀臺司並州有軍校笞他部卒至死獄具奏上法官謂非所部當如凡人公執奏之曰並接羌人兵數十萬一旦因一卒法死一校卒有輕所部之心且生事不若杖遣之於權宜為便上如法官議不數日並卒怨本校白晝五六輩提刀趨喧爭前刺校心胸狼籍尸下遂竄去朝廷方以公向所執為是忠定公為御史中丞一日於行香所宰相張齊賢呼參知政事溫仲舒為鄉弟及他語尤鄙錢希白所撰公志日彈執政之事失辭者此也公以非所宜言失人臣體遂彈奏之齊賢深以為恨後於上殿短公曰張詠本無文凡有章奏皆婚家王禹稱代為之禹稱前任翰林作齊賢罷相麻其辭醜詆及再入中書禹稱亦再知制誥故兩中傷之公聞自辨曰臣苦心文學縉紳莫不知今齊賢以假手於人是掩上之明誣臣之非罪也上曰卿平生著述幾多可進來公遂以所著進上閲於龍圖閣未竟賜坐曰今日暑甚顧黃門於御几取常所執紅銷金龍扇賜公且稱文善公起再拜乃納扇於几上曰便以賜卿美今日獻文事也忠定公後自金陵入苦腦疽未朝見御史閣門纍有奏止寬其告俾養疾公恨不得面陳所懷乃抗論近年以來虛國家帑藏竭生民膏血奉無用之土木皆丁謂王欽若啓上心之所為也不誅死無以謝天下章三上不報出知陳州孫明復先生退居太山之陽枯稿憔悴鬢髮皓白著春秋尊王發微十五篇為春秋學者未有過之者也故相李文定公守兖就見之嘆曰先生年五十一室獨居誰侍左右不幸風雨食飲生疾奈何吾弟之女賢可以奉箕帚先生固辭文定曰吾女不妻先生不過為一小官人妻先生德髙天下幸壻李氐榮貴莫大於此先生曰宰相女不以妻公侯貴戚而因以嫁山谷衰老藜藿之人相國之賢古無有也不可不成相國之賢遂妻之其女亦甘淡薄盡婦道士大夫莫不賢之澠水燕談録卷二
