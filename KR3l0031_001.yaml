body:
  text: 澠水燕談錄卷一宋王闢之撰帝徳西都北寺應天禪院乃太祖誕聖之地國初為傳舎真宗幸洛陽顧瞻遺迹徘徊感愴乃命建為僧舎功成賜院額奉安神御命知制誥劉筠誌之仁宗初又建别殿分二位塑太宗真宗聖像丞相王欽若為之記後園植牡丹萬本皆洛中尤品慶厯末仁宗御神御三殿碑藝祖曰興先太宗曰帝華真宗曰昭孝今為忌日行香地去留府甚逺故詩曰正夢寐中行十里此之謂也開寶中教坊使魏某年老當補外援後唐故事求領小郡太祖曰伶人為刺史豈治朝事尚可法耶苐令於本部中遷敘乃以為太常太樂令興國中張觀樂史鏁㕔合格不得進士第止以為幕職官太宗之愛惜科名如此慶厯中郎官吕覺勘公事囘登對自陳衣緋已久乞改章服仁宗曰待别差遣與卿換章服不欲因鞫獄與人恩澤慮刻薄之徒望風希進加人深罪耳帝寛厚欽恤之徳如此廟號曰仁不亦宜乎明道二年二月十一日真宗行籍田禮就耕位侍中奉耒進御上搢圭秉耒三推禮儀使奏禮成上曰朕既躬耕不必泥古願終畝以勸天下禮儀使復奏上遂耕十有二畦翌日作籍田禮畢詩賜宰臣已下和進尋詔吕文靖公編為籍田記時許開封國學舉人陪位因得免解寶元康定間西方用兵急於邊用言利者多捃摭細㣲頗傷大體仁宗厭之乃詔曰議者並須䆒知本末審可施用若事已上而驗白無狀者事効不著當施重罰於是輕肆者知畏而不敢妄言利害也仁宗朝南劒州上言石碑等銀鑛可發上謂三司使曰但不害民則為國利或於民有害豈可行也上之恤愛元元至矣晁文元公迥在翰林以文章徳行為仁宗所優異帝以君子長者稱之天禧初因草詔得對命坐賜茶既退已昏夕真宗顧左右取燭與學士中使就御前取燭執以前導之出内門傳付從史後曲燕宜春殿出牡丹百餘盤千葉者纔十餘朶所賜止親王宰臣真宗顧文元及錢文僖各賜一朶又常侍宴賜禁中名花故事惟親王宰臣即中使為揷花餘皆自戴上忽顧公令内侍為戴花觀者榮之其孫端稟嘗為余言咸平三年大理寺上言曰本寺案牘未決者常幾百事近日逾月並無公案漢文決死刑四百唐太宗決死罪三百史臣書之以為刑措今以四海之廣而奏牘不聞動輙逾月足以知民識禮義而不犯於有司也請載之史筆祥符中諸王有以翰林使醫有効乞除遥郡真宗曰醫之為郡非治朝美事厚賜之可也仍令宰相諭此意真宗一日晩坐承明殿召學士對既退中人就院宣諭曰朕適忘御袍帶卿無訝焉學士將降謝中人止之云上深自愧責有㫖放謝真宗禮遇詞臣厚矣太祖討平諸國收其府藏貯之别府曰封椿庫毎嵗國用之餘皆入焉嘗語近臣曰石晉割幽燕諸郡以歸契丹朕憫八州之民久隔疆境俟所蓄滿五百萬緡遣使契丹以贖山後諸郡如不我從即散府財募戰士以圖攻取㑹晏駕乃寢後改曰左藏庫今為内藏庫真宗嘗諭宰臣一外補郎官稱其才行甚美俟罷郡還朝與除監司及還帝又語及之執政擬奏將以次日上之晩歸里第其人來謁明日以名薦奏上黙然不許執政察所以乃知已為伺察宻報矣終真宗朝其人不復進用真宗惡人奔競如此慶厯中滕子京守慶州屬羌數千人内附滕厚加勞遺以結其心御史梁堅言滕妄費公庫錢仁宗曰邊帥以財利㗖蕃部此李牧故事安可加罪仁宗朝流内銓引改京官人李師錫上覽其薦者三千餘人問其族系乃知丞相王徳與甥壻上曰保任之法欲以盡天下之材今但薦勢要使孤寒何以進止與師錫循資後翰林學士胡宿子宗堯磨勘以保官亦令循資帝之照見物情抑權勢進孤寒聖矣英宗治平中燕國恵和公主下降王師約異時尚主之家例降昭穆一等以為恭帝疾之曰此廢人倫之序不可以為法思有以厚風俗亟命正之尚未遑著於令及神宗踐阼乃詔公主出降皆行見舅姑禮是時師約父克臣為開封府判官前一日中使促就第受主見行盥饋禮成遂大設樂天下榮之三宫嬪御還者莫不嗟嘆近姻貴戚相與震動以為天姬之貴尚執行婦道盖自恵和始耳唐南平公主下降王珪之子珪坐令親執行筓饋盥之禮曰吾豈為身榮所以成國家之美耳唯我祖宗首正王化穆然成風矣魯人李廷臣頃官瓊管一日過市有獠子持錦臂韝鬻於市者織成詩取而視之仁廟景祐五年賜進士詩也云恩袍草色動仙籍桂香浮仁祖文章掞麗固足以流播荒服盖亦仁徳醲厚有以深浹夷獠之心故使愛服之如此也廷臣以千文易得之帖之小屏置几席間以為朝夕之玩讜論慶厯中開寶寺塔災國家遣人鑿塔基得舊瘞舎利迎入内庭送本寺令士庻瞻仰傳言在内庭時頗有光恠將復建塔余襄公靖言彼一塔不能自衛何福逮於民凡腐草皆有光水精及珠之圓者夜亦有光烏足異也梁武造長干塔舎利常有光臺城之敗何能致福乞不營造仁宗從之夏竦薨仁宗賜諡曰文正劉原父判考功上疏言諡者有司之事且竦行不應法今百司各得守其職而陛下奈何侵之乎疏三上是時司馬溫公知禮院上書曰諡之美者極於文正竦何人可當光書再上遂改諡文獻知制誥王原叔曰此禧祖皇帝諡也封還其目不為草詔於是太常更諡竦文莊嘉祐中内臣麥允言死以其嘗有功特給鹵簿司馬光言古不以名器假人允言近習之人非有大功勲而贈以一品給以鹵簿不可為法仁宗嘉納之仁宗朝司天奏月朔日當食而陰雲不見事同不食故事當賀司馬光曰日食四方皆見而京師獨不見天意若曰人君為陰邪所蔽天下皆知而朝廷獨不知其為災尤甚不當賀詔嘉其言後以為例景祐中趙元昊尚修職貢蔡州進士趙禹庻明言元昊必反請為邊備宰相以為狂言流禹建州明年元昊果反禹逃歸京上書自理宰相益怒下禹開封府獄是時陳希亮為司錄言禹可賞不可罪宰相不從希亮争不已卒從希亮言以禹為徐州推官徂徠先生石守道有詩曰蔡牧男兒忽議兵謂禹也咸平中孫冕乞於江淮荆湖通商賣鹽許商人於邊上入糧草或京中納錢帛一年之内國家預得江淮荆湖三路賣鹽課額而又公私之利有十倍焉為陳恕等沮之遂寢臨淄賈先生疎以著書扶道為己任著山東野錄七篇頗𩔖孟子常奏諫者書四篇謂丁謂造作符瑞以誣皇天以欺先帝今幸為姦發請明告天下正其事無㡬又謂謂既竄逐冦萊公猶在雷州宜還萊公以明忠邪先生終以孤直不偶既晩得進士出身不樂為吏久之李文定公竊其誥勑送吏部先生勉就之官至殿中丞卒後門人李冠元伯劉顔子望相與諡曰存道先生初先生得出身真宗賜名同改字希徳狄武襄既平嶺南仁宗欲以為樞宻使平章事龎莊敏公曰太祖遣曹彬平江南止賜錢二十萬其重慎名器如此今青功不及彬若用為平章事富貴已極後安肯為陛下用力使後有冦盜青更立功陛下以何官賞之乃以青為䕶國軍節度諸子皆優官厚賜金帛真宗初上仙莊獻攀慕號切凡喪祭之禮務極崇厚吕文靖公奏曰太后為先帝喪紀之數宗廟之儀不忍裁減曲盡尊奉此雖至孝之道以臣所見尚未足報先帝恩遇之厚唯是逺姦邪奬忠直惜民財㧞擢時彦使邊徼寧靖人物富安皇帝徳業日茂太后壽樂無憂此報先帝之大節也祥符中玉清昭應等宫成大臣率兼使領天聖中玉清災莊獻泣曰先帝尊奉先祧故大建館御以盡祗肅之道今忽災燬何以稱先帝遺意吕文靖公恐后復議繕完因推洪範災異之端乞罷營建懇讓使名玉清遂不葺田錫以讜直事太宗知無不言深得諍臣之體一日詣中書謁趙忠獻公曰公以元勲當軸宜自謙抑今百司奏覆必先經堂豈尊君之義也諫臺章疏令閣門進狀尤失風憲之體趙竦然謝之遽從其言澠水燕談錄卷一
