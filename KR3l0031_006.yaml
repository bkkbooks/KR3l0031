body:
  text: 澠水燕談録卷六宋王闢之撰官制唐以中官為樞密使與中尉謂之內貴梁為崇政院使後唐舊有帶相印者分東西二院晉廢國初復置與中書為二府亦名二院但行東院印耳其後除授不常以檢校官充使不帶正官自趙普始帶節鉞自曹彬始簽書院事自石熙載始文資正官充使亦自熙載始知院自張士遜始以文臣知院兼使相自王欽若始簽書兼藩正自曹瑋始今官制復古而樞密之職如舊與三省長官通謂之執政矣唐末始分度支鹽鐵户部專領財賦唐明宗始號三司總以一使本朝或曰判三司或曰權判或曰㸃檢三司開寶中以參知政事二人㸃檢三司既而更用宰相為提舉興國中分二使同判三司逾年後析為三使淳化中又合為三司而又以天下為十道二京為左右計置二計使分判十道别命三司總計使判左右計事三司如故咸平末三司各置副使其使輕則曰發遣迄元豐初不廢今悉歸尚書省五代以來諸州馬步軍院虞候以衙校為之太祖慮其任私髙下其手乃置司冦參軍以進士九經及第人充之河東柳開及第為宋州司冦參軍後改曰司理參軍今俚俗以司理院為十院建隆中擇才能之士出宰大邑大理正祈奚知大名府館陶縣監察御史王祐知魏縣選朝官知縣自此始太祖重縣令之任至矣國朝孔子之後率襲封文宣公至和中祖擇之言文宣聖諡號後嗣不當以為封爵下學士院更定美稱仍改封其孫宗願為衍聖公故事親王女皆封郡縣主趙普以元勳諸女封郡主髙懷德二女特封縣主當時禮官不言其失諫官不言其非此典禮之誤也國初州郡自置邸吏散在都下外州將吏不樂久居京師又符移行下率多稽遲或漏泄機事太平興國初起居郎何保樞奏置鈐轄諸道都進奏院以革其弊人給銅朱印一紐國初江淮湖湘上供軍糧歲無定數景德中發運使李溥奏立年額詔歲以六百萬石為定有災即申乞減數至今以為常國初令民田七頃納牛皮一張角一對筋四兩建隆中令供納價錢一貫五伯文稅額中牛皮錢是也國初南郊青城久占民土妨其耕稼又其中暖殿止是搆木結綵至尊所御非所以備不虞天聖中魏餘慶上言乞優給價直收買民田除放租稅為瓦殿七間依奏升朝官每歲誕辰端午初冬賜時服止於單袍太祖訝方冬猶賜單衣命易以夾服自是士大夫公服冬則用夾前朝宰相朝罷賜坐凡軍國大事參議之從容賜茶而退所謂坐而論道也其他事無大小一用狀擬進入上親批可其奏印以御寶謂之印書降出宰相奉行國初范質在其位自以前朝舊臣乃具劄子靣取進退各執所得㫖同列連書以記之自此奏覆浸多而賜茶之禮亦寢王元之嘗言宰相於政事堂樞密於都堂同時見客不許本㕔私接議者以為是疑大臣以私也遂寢或以元之所乞為當但難其率宰相於政事堂共見耳其後二府乞以朝退時聚㕔見客以杜請謁從之卒如元之之言太宗愼刑罰淳化二年始置審刑院以覆大理奏案以近臣一人知院事設詳議六人擇京朝曉律常任法寺官者為之每奏一人從知院上殿例得賜緋故士大夫以審刑為朝官染院舊制郊祀禮成駕還闕門有勘契之儀其制以劄為箭長三尺鏤金飾其端緘以泥金絳囊金吾掌之金塗銅為鏃長三寸其端所以合符者也貯以泥金紫囊駕前掌之駕至端門閽吏闔扉以問曰南來者為誰駕前司告曰天皇皇帝奏請行勘箭之鏃交勘奏曰勘訖又審曰是否贊者齊聲曰是三審乃啓扉列班起居駕乃入契刻檀為魚金飾鱗鬛劄刻檀板為坎足以容魚殿前掌板駕過殿門合魚乃啓扉其制如勘箭之儀熙寧中詔罷其制蔡文忠公自為布衣時已恢廓有大志而姿表秀異見者多聳動祥符中擢進士為天下第一真宗臨軒日大悅之顧寇萊公曰得人矣特詔給金吾衛七人清道時以為榮尋詔自今第一人及第給金吾七人當直許出兩引喝陳堯咨以龍圖閣待制換觀察使自陳臣本儒生嘗少習爼豆今荷聖恩易以武辨願佩金魚以示優異特詔從之舊制枷惟二等以二十五斤二十斤為限景德初陳綱提㸃河北路刑獄上言請制杖罪枷十五斤為三等詔可其奏遂為常法景德中真宗御筆六事以示近輔三曰提㸃刑獄乃於朝臣及武臣使副中選清幹者使提㸃一路刑獄按舉官吏賢否後又加勸農使逮今不廢祥符二年朝廷以京獄訟之繁懼有寃滯始置糾察在京刑獄司以省寃濫命知制誥周起侍御史趙湘為之凡在京師刑獄御史開封府皆得糾之起慮抑屈者不能盡知乞許令糾察陳狀從之但不鞫獄天聖中詔每遇覃霈朝臣中兄弟俱該封贈許列狀陳乞特比常例優加封叙從王子融請也周禮卿大夫卒太史於葬前賜諡祖奠之曰續誄後世失於申明典禮故須門生故吏録行狀子孫請諡近世遂有既葬而諡號終不及者天聖中孫奭王子融言乞臣僚薨謝不待本家請諡在官品合加諡者並令有司舉行詔從之澠水燕談録卷六
