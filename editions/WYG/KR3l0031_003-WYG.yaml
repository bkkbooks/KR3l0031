body:
  text: 澠水燕談錄卷三宋王闢之撰知人希夷先生陳摶語人禍福若符契王世則與韓見素趙諫同詣先生世則偽為僕拜於堂下先生笑之曰侮人者自侮也揖世則坐於諸坐之右將來科名君為首冠諸君之次正如此㑹明年世則舉進士第一餘如坐次河東栁先生開以髙文苦學為世宗師後進經其題目者翕然名重於世嘗有詩贈諸進士曰今年舉進士必誰登髙第孫何及孫僅外復有丁謂未㡬何僅連牓狀元謂亦中甲科其知人如此孫何孫僅學行文辭傾動塲屋何既為狀元王黃州覽僅文編書其後曰明年再就堯階試應被人呼小狀元後牓僅果為第一黃州復以詩寄之云病中何幸忽開顔記得詩稱小狀元粉壁乍懸龍虎牓錦標終屬鶺鴒原幷寄何詩曰惟愛君家棣華牓登科記上並龍頭潘逍遥亦有詩曰歸來遍檢登科記未見連年放弟兄而陳堯佐堯咨兄弟亦前後相繼為狀元實士林盛事慶厯二年仁宗用范文正公叅知政事韓魏公富韓公為樞宻副使天下人心莫不懽快徂徠石守道作聖徳詩曰惟仲淹弼一䕫一卨又曰琦器魁礧豈視扂楔可屬大事重厚如勃其後富范為宋之名臣而魏公定冊兩朝措天下於泰山之安人始嘆石之知人也竒節國初御史中丞劉温叟博學純厚動必由禮父諱岳温叟終身不聴絲竹嘗令子和藥有天靈葢温叟見之亟令致奠埋於郊五代士人鮮蹈禮義獨温叟篤行為世所推端拱初太宗詔訪天下髙年前青州錄事叅軍麻希夢年九十餘居臨淄召至闕下延見便殿賜坐語次從容詢及人間利害對之尤詳多蒙聴納他日訪以養生之理對曰臣無他術惟寡情慾節聲色薄滋味故得至此詔以為工部郎中致仕賜金紫工部好學善訓子孫子景孫興國中登進士甲科孫温其温舒祥符中相繼登第為天下第三人衣冠以為盛事而天下稱麻氏教子有法趙隣㡬好學著述太宗擢知制誥逾月卒子東之亦有文才前以職事死塞下家極貧三女皆幼無田以養無宅以居僕有趙延嗣者久事舎人義不􅃘去竭力營衣食給之雖勞苦不避如是者十餘年三女皆長延嗣未嘗見面至京師訪舎人之舊謀嫁三女見宋翰林白楊侍郎徽之發聲大哭具道所以二公驚謝曰吾被衣冠且與舎人友而不能恤舎人之孤不迨汝逺矣即迎三女歸京師求良士嫁之三女皆有歸延嗣乃去徂徠石守道為之傳以厲天下云徂徠石守道少以進士登甲科好為古文雖在下位不忘天下之憂其言以排斥佛老誅貶姦邪為己任慶厯中天子罷二相進用韓魏富范增置諫官鋭意求治先生喜曰吾官博士雅頌吾職也乃作慶厯聖徳詩五百言以别白邪正太山孫明復見之曰子禍起矣由是謗論喧然姦人嫉妬相與擠之不幸病卒有以媾禍中傷大臣者指之起事曰石某詐死必北走矣請斵棺以驗朝廷知其誣不發棺歐陽文忠公哭以詩沒後妻子流落寒餓魏公分俸買田以給之所謂大臣乃先生嘗薦於朝者姦人即先生詩所斥者也元祐中執政薦先生之直詔官其子王沂公當軸以厚重鎮天下尤抑奔競張師徳久次館閣博學有時望而不事造請最為魯肅簡所知一日中書議除知制誥者魯盛稱張才徳沂公以未識為辭魯宻諷張見沂公張辭不徃魯屢諷之張重違魯意始緣職事一徃沂公辭不見張大悔恨他日中書復議魯無以易張曰向已為公言之矣沂公曰張君器識行義足以為此然尚有請謁耳逾年方命掌誥沂公之取人如此慶厯中張宗晦以祕書監致仕居洛陽一日謁留守其子庚言唐賀監知章以道士服歸㑹稽明皇賜以鑑湖今洛中嵩山雖非朝廷所賜大人可衣羽服優㳺其間何以事請謁宗晦曰吾作白頭老監枕書而眠何必學賀老作道士服邪時以為名言曹州于令儀者市井人也長厚不忤物晚年家頗豐富一夕盜入其家諸子擒之乃隣子也令儀曰汝素寡悔何苦而為盜邪曰廹於貧耳問其所欲曰得十千足以衣食如其欲與之既去呼之盜大恐謂曰汝貧乗夜負十千以歸恐為人詰留之至明使去盜大感愧卒為良民令儀擇子姪之秀者起學室延名儒以掖之子伋姪傑倣舉進士第今為南曹令族丹陽顧方篤行君子也皇祐末登進士第再調明州象山縣令視事之初召邑中父老詢問民間利害及境内士民之善惡者勸使勿怠戒使自修又建學舎率其子弟之秀者教之暇日親為講説掖誘使進於善逾年民大化服俄而病邑民相率出錢詣㙮廟祈禱者數千百人為臠股者十三人方竟不起百里之内號泣思慕如失父母與立祠以嵗時祀丹陽錢君倚毗陵胡完夫皆為方記其事而刻石祠中士大夫詩頌不可勝記胡文恭公宿平生守道不以進退為意在館二十餘年每語後進曰富貴貧賤莫不有命士人當脩身俟時無為造物所嗤世以為名言近士大夫多脩佛學司馬温公患之嘗為解禪偈六篇云忿怒如烈火利欲如銛鋒終朝長戚戚是名阿鼻獄顔囘甘陋巷孟軻安自然富貴如浮雲是名極樂國孝弟通神明忠信行蠻貊積善來百祥是名作因果仁人之安宅義人之正路行之誠且久是名不壞身道徳修一身功徳被萬物為賢為大聖是名菩薩佛言為百世師行為天下法久久不可揜是名光明藏徐仲車博學志行父石少亡終身不登山行嘗冒暑道遇奔喪者輟馬以遺之徒行還家憇户外風乗之得聾疾年僅四十勉從母命作詩賦一舉進士第久之喪母哀毁過人葬母助葬者數千人大名栁仲塗少時縱酒酒肆坐側有書生接語以貧未葬父母將謁魏守王公祐求資以給襄事先生問所費㡬何曰得錢二十萬可矣先生曰姑就舎吾為子營之罄其資得白金百兩錢數萬遺之議者以郭代公不能過劉温叟以徳義世其家當時推服為御史中丞家極貧時太宗尹京致五百千以贈温叟拜受以大匱封貯御史之西廊或有語之者曰晉王身為京尹兄為天子拒之則失敬吾方為御史受而用之則何以清流品也澠水燕談錄卷三
