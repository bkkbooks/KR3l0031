body:
  text: 澠水燕談録卷七宋王闢之撰貢舉蘇德祥漢相禹圭之子建隆四年進士第一人登第初還鄉里太守置宴以慶之作樂伶人致語曰昔年隨侍嘗為宰相郎君今日登科又是狀元先輩言雖俚俗而頗盡其實德祥孫丕有髙行少時一試禮部不中拂衣去居渳水之濵五十年不踐城中歐陽文忠公鎮青言於朝廷賜號沖退處士年八十餘卒進士之舉至本朝尤盛而㳂革不同開寶六年因徐士廉伐鼓訴訟帝御講武殿覆試覆試自此始賜詩自興國二年吕蒙正榜始分甲次自興國八年王世則榜始賜袍笏自祥符中姚曄榜始賜宴自吕蒙正榜始賜同出身自王世則榜始賜别科出身自咸平三年陳堯咨榜始唱名自雍熙二年梁皓榜始彌封謄録覆考編排皆始於景德祥符之間雍熙中著作佐郎樂史特賜進士及第詔附於興國五年第一等之下賜第附榜始於此太宗朝趙昌國者自陳乞應百篇舉帝親出五言四句為題云秋風雪月天花竹鶴雲煙詩酒春池雨山僧道柳泉凡二十字字為五篇篇四韻至曉僅成數篇辭意無足取亦賜及第用勸真宗朝錢希白賢良方正擢第慶厯中子明逸子飛彥遠子髙相繼制舉登科嘉祐末蘇軾弟轍同年制䇿入等衣冠以為盛事故子髙謝啓云兩朝之間相繼者父子十年之間並進者兄弟子瞻汝州謝表曰兄弟並竊於賢科衣冠或以為盛事而子瞻入等尤髙故謝啓曰誤玷久虛之等希白從孫藻皇祐五年登進士第是年晚書中選後十年復登科舉謝啓曰十年三第屢玷於主司一門四人無替於祖烈咸平元年開封發解以髙輔堯為首錢易次之易有時名不得魁薦頗不平上書言試題語涉譏諷輔堯亦請以解頭讓易上命錢若水覆考既而上以為士人爭進不可長止令擢文行兼者一人為首乃以孫暨為第一輔堯次之祥符二年真宗東封岱山放梁固已下進士三十一人及第四年祀后土於汾隂放張師德已下三十一人及第固雍熙二年狀元皓之子師德建隆二年狀元去華之子兩家父子狀元當時士大夫榮之甘棠魏野以詩賀之曰封禪汾隂連歲榜狀元俱是狀元兒和魯公凝梁貞明三年薛廷圭下第十三人及第後唐長興四年知貢舉獨愛范魯公質程文語范曰君文合在第一輒屈居第十三人用傳老夫衣鉢時以為榮其後相繼為相當時有贈詩者曰從此廟堂添故事登庸衣鉢盡相傳嘉祐中蘇轍舉賢良對策極言闕失其略云聞之道路陛下中官貴姬至以百數歌舞飲酒歡樂失節坐朝不聞咨謨便殿無所顧問考官以上無此事轍妄言欲黜之仁宗曰朕設制舉本待敢言之士轍小官如此直言特與科名張鄧公士遜以監察御史為諸科考試官以舉子有當避親者求免去主司不從真宗嘉之自後試官親戚悉牒送别頭考校至今著為令熙寧中孔文仲舉賢良方正制䇿入等以忤時政不推恩孫靖公固言科舉徒取一日之長言之虛華不足校矧制舉本以求直言豈以忤而黜之邪今朝廷以文仲之言足以惑天下臣恐天下不惑文仲之言而以文仲之黜為惑慶厯五年仁宗臨軒賜進士第審刑官祝諫侍廷中中男中甲科次男虞弟咨一壻皆擢第季弟許得同出身每唱一名即稱謝是日諫五拜殿下仁宗以問近臣對以皆子弟也仁宗嘉之文儒書籍附廬山寺有蓮花藏藏有白集七十卷傳云居易自寫同遠大師文集不許出寺廣明初髙駢强取去後四十餘年有王長史者遍求善本校正而藏之旋又為長史易去頗多舛謬真宗詔取至都下令侍臣以諸本參校繕寫付寺僧謹藏之青州夀光張荷若山早依田告為學告卒入終南師事种放而吳遁魏野楊朴宋澥皆友也性髙潔為文竒澀初髙辨公儀作帝刑三篇以示放放歎曰隋唐以來綴文之士罕能及之學者翕然競傳其文及荷著過非九篇成放見之曰又在帝刑之上矣終以連蹇不遇卒子孫流落荷之文散亡無幾捃收其遺得文若詩九千一百一十五篇為三卷藏於家將以遺荷之子孫焉唐杜進家書跋尾皆自題書以戒子孫曰清俸買來手自校子孫讀之知聖道鬻及借人為不孝蘇維嶽家杜氏書尤多所題皆完近年朝議大夫謝曄好蓄書率自校正以二十厨貯之取杜詩去一之字厨一刻字以别書部謝氏子孫多賢令子仲子廣文孫牧皆登甲科少微嘗舉茂才慶厯中滕子京謫守巴陵治最為天下第一政成增城嶽陽樓屬范文正公為記蘇子美書石邵餗額亦皆一時精筆世謂之四絶云劉原父文章敏贍嘗直舍人院一日追封皇子公主九人方下直為之立馬却坐一揮九制成文辭典麗各得其體真天才也歐陽文忠公聞而嘆曰昔王勃一日草五王策未足尚也濟州朝端友沉靜清介工文辭尤長於詩常自晦匿不求知以進士從仕二十餘年為著作郎以卒其子補之録詩三百六十篇求子瞻序之方子瞻之守杭也端友為新城令與遊三年知其君子而不知其能為詩夫以端友之文子瞻之明且好賢而又相從久猶有所不知則士之蘊文行不為世知者可勝數耶孫洙巨源博學長才初舉賢良方正奏論五十篇皆陳祖宗政事指切治體推往驗今著見得失天下爭傳寫之目曰經緯集韓魏公覽而嘆曰慟哭太息以論天下事今賈誼也趙師民周翰博學醇德為本朝名儒尤為仁宗所眷自登第入學館預校讐登經筵參侍幾三十年晚以龍圖閣學士出守耀州仁宗親筆御詩寵其行序有儒林舊德出守近藩之語後宋次道撰公碑題其額曰儒林舊德之碑龍昌期陵州人祥符中别注易詩書論語孝經隂符道德經携所注遊京師范雍薦之朝不用韓魏公按撫劒南奏為國子四門助教文潞公又薦授校書郎講說府學明鎬再奏授太子洗馬明堂泛恩改殿中丞又注禮論注政書帝王心鑑八卦圖精義入神絶筆書河圖照心寶鑑春秋復道三教圖通天保正名等論竹軒小集昌期該洽過人著撰雖多然所學雜駁李畋渭卿自號谷子少師任奉古以著述為志性靜退不樂仕進士夫多稱之為張乖崖所器少日一出廷試後隱居永康軍白沙山從之學者甚衆任中正薦乞賜處士之號詔為試校書郎凌䇿又薦之召授試懷寧主簿國子監說書改大理丞知泉州惠安縣久之以先所著未成再乞國子監說書以終其業著孔子弟子傳讚六十卷上之得知榮州秩滿致仕畋撰道德經疏二十卷張乖崖語録二卷谷子三十卷歌詩雜文七十卷年九十先兆艾頴侍郎少鄉貢入京師中途逢一叟謂頴曰子相甚貴此去當第授頴書一册乃春秋左傳頴熟讀之禮部試鑄鼎𧰼物賦出所得書頴甚喜援筆立成若有相之者擢甲科王元之謫守黃州有二虎鬭一虎死食之殆半羣雞夜鳴日官謂守土者當其咎太宗惜其才即徙蘄州謝表云有茂陵封禪之書正期身後之語帝深異之促詔還臺未行捐館初冦萊公十九擢進士第有善相者曰君相甚貴但及第太早恐不善終若功成早退庶免深禍蓋君骨類盧多遜耳後果如其言丁朱崖當政日宴私第忽語於衆曰嘗聞江南國主鍾愛一女諭大臣曰吾止一女姿儀性識特異人卿等為擇佳壻須年少美風儀有才學門第髙者或曰洪州劉生為郡參謀年方弱冠風骨秀美大門嘗任二卿博學有文可以充選國主亟令召至見之大喜尚主拜駙馬都尉鳴珂鏘玉出入禁闥甲第珍寶竒玩豪華富貴冠於一時未幾主告殂國主悲悼不勝曰吾將不復見劉生削其官一物不與遣還洪州生恍疑夢覺觸目如失丁笑曰某他日不失作劉參謀也未幾有海上之行籍其家孑然南去何先兆之著也吳文肅公奎將舉賢良一夕夢入魏文帝廟召升殿顧問羣臣優劣公未及對帝曰韓延夀為最是夕門下抄書吏楊開者夢公讀楊阜傳翊日告公公異之即取二傳覽之及祕閣試六論一題乃韓延夀楊阜孰優公遂膺首選王元規慶厯末赴吏部選一夕夢一人衣冠髙古因訪以當受何地官期早晚書八字與之云時生一陽體合三水既覺不悟意及注官河南府河清主簿凡三字從水到官日正冬至趙少師少名公禋一夕夢人持名籍有金書趙槩字及覺改名槩又嘗夢通判汝州既登甲科果通判海州或以文校之汝海字頗相類韓存寶本羌熟户少負才勇喜功名纍立功年未四十為四方館使涇原總管一日郡僚繪像渭州僧舍或為其色不類令以粉筆塗其靣將别圖貌未及促詔赴闕命經制戎盧賊冦人覩其無首咸為不祥明年存寶以奏功不實誅馮當世少孤寓武昌縱飲不羈一夕醉卧郊外溪邊有漁者罷漁艤舟困眠有人叱之曰馮侍中在此安得不避漁者驚起步月岸上一人衣冠熟睡草間詢之知為馮也即拜曰他日貴顯幸勿忘具以夢告因請卧舟中以避風露馮睡至曉與共載入郡後馮貴使訪漁舟不復見王獵酸棗人天聖末纍舉未第一夕夢紫衣吏召至一宫門守衛甚盛揖入升㕔對拜者紫衣金帶年三十許禮甚恭既坐辭甚遜覺後私記其年月獵後困於場屋久之推恩五舉得同出身登仕又二十餘年年且七十始為尚書員外郎將乞身以去故人或止之㑹英廟入繼為皇子近臣薦公為宫僚赴皇子位門闌守衛宛如夢中及升㕔拜揖則衣冠儀貌亦與夢中無異歸視篋中所記乃英廟所生時也侍讀宫邸未及期年英廟即位遂登侍從進士李某者久未第一日訊命日者曰君遇三韓即發祿李乃遍訪貴人韓姓者兾蒙推轂而卒無知者元豐中朝廷遣使髙麗有與李故人者奏名同往至其國考圖籍乃古三韓之地也使還賜出身孫莘老初為太平令有吕同者授館於孫一夕夢試南宫中髙選主文孫也衣緋魚覺以告孫孫曰子學已充料不日取髙第而某方仕州縣何事文衡况朱衣豈主文服邪熙寧初吕赴禮部試孫以記注知諌院同知貢舉尚衣緋吕大喜必在髙等俄又被黜大悵恨自放江湖無復宦意元豐初吕以五舉免解再赴禮部孫以祕書少監知舉尚衣五品服榜出吕預髙薦皇祐二年陳珙知雍州冬至日珙旦坐㕔事僚吏方集有白虹貫庭自天屬地明年五月龍鬭於城南江中馳逐往來久之水暴漲未幾儂智髙陷二廣前此陶弼以詩貽楊畋請為備云虹頭穿府署龍角陷城門元豐中汶上梁逖一夕夢奏事殿中見御座前揭一碑金箔大書黃裳二字意必貴兆也因改名黃裳明年御前唱進士第南劒黃裳為天下第一王彥祖初名元宗慶厯二年方勝冠廷試應天以實不以文賦罷寢旅舍一人告之曰今年未當中第彥祖尤不平且責之曰子未嘗見豫程文又未始知豫生月何從而知未中第其人笑曰君若中選賦題天字在下君當三中選皆然今題天字在上第二字是以知其未也及唱名果不預選次舉春試不利於禮部八月再預廷試蓋軫𧰼天地賦又復黜至皇祐五年免解赴禮部前以卧疾困眠夢至一大府見二人因懇求平生祿命二人笑不答再叩來年得失其人指靣前池水曰但此頭分流君即登第覺以為無理而池不能分流決無中第望矣久之乃寤即更名汾以符水分之兆及試禮部嚴父莫大於配天賦廷試圓丘𧰼天皆中髙選其後召試學士院又賦明王謹於事天得帖館職皆符夢中之言也元祐四年夏豫初至河東一日與郡僚旅見提刑孫亞夫孫曰近日府中角聲不和應在太守時蒲資政方到未幾王震待制自同復鎮蒲俱丁母夫人憂去至九月孫復語郡官曰角聲不和尤甚前日尋報蒲中行龍圖自襄移蒲十月到官明年春病卒其驗如此不知何術成都譙開博極羣書而不求榮利簡靜沖退好修身之術日遊大慈寺博訪異聞以廣所學久為蜀中士大夫所稱文同與可尤重之目曰大慈仙治平三年上已夜有人觸其户開秉燭視之一叟白鬚布裘酣寢户外開呼之使去行且語曰明年正月聖人當出開意其狂醉不以為怪視睡處一燒餅一藥帖逐之已不見與可取餅藥以去明年正月神宗嗣位術士李某忘其姓名亦傳管輅軌格法畫卦影頗有驗今丞相頃嘗問之卦影畫水邊一月中有口未幾除知湖州又盧龍圖秉使占卦影亦同乃除知渭州字雖不同而其影皆同澠水燕談録卷七
